        case"cmhc":    return calc.cmhcAmt>0?<><div style={{fontSize:mobile?13:14,fontWeight:700,color:C.amber}}>{fCAD(calc.cmhcAmt,0)}</div><div style={{fontSize:10,color:C.label,marginTop:1}}>{(calc.cmhcRate*100).toFixed(2)}%</div></>:<div style={{fontSize:mobile?13:14,fontWeight:700,color:C.green}}>None</div>;
        case"mortgage":return <div style={{fontSize:mobile?13:14,fontWeight:700,color:C.blue}}>{fCAD(calc.totalMtg,0)}</div>;
        case"payment": return <><div style={{fontSize:mobile?18:22,fontWeight:700,color:"#fff",letterSpacing:"-0.03em"}}>{fCAD(calc.freqPmt,2)}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:2}}>{calc.rate.toFixed(2)}%  {calc.amort}yr</div></>;
        case"termbal": return <><div style={{fontSize:mobile?15:17,fontWeight:700,color:C.amber,letterSpacing:"-0.02em"}}>{fCAD(calc.balAtRenewal,0)}</div><div style={{fontSize:10,color:C.label,marginTop:1}}>{calc.term}yr term</div></>;
        case"termint": return <><div style={{fontSize:mobile?13:14,fontWeight:700,color:C.red}}>{fCAD(calc.termInt,0)}</div><div style={{fontSize:10,color:C.label,marginTop:1}}>{calc.term}yr</div></>;
        case"ltt":     return <div style={{fontSize:mobile?13:14,fontWeight:700}}>{fCAD(calc.lttTotal,0)}</div>;
        case"close":   return <div style={{fontSize:mobile?14:16,fontWeight:700,color:C.green}}>{fCAD(calc.cashToClose,0)}</div>;
        case"monthly": return <><div style={{fontSize:mobile?13:14,fontWeight:700}}>{fCAD(calc.monthlyExp,0)}</div><div style={{fontSize:10,color:C.label,marginTop:1}}>/mo</div></>;
        default:return"";
      }
    }

    const activeCols2=mpCols.slice(0,mpNumCols);

    return(
      <div style={{paddingBottom:16}}>
        {/* Title + scenario controls */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <SectionTitle>Canadian Home Cost</SectionTitle>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <span style={{fontSize:12,color:C.label}}>Scenarios</span>
            <div style={{display:"flex",gap:4}}>
              <button onClick={()=>setMpNumCols(n=>Math.max(1,n-1))} disabled={mpNumCols<=1}
                style={{width:30,height:30,borderRadius:8,border:"1px solid "+C.border,background:mpNumCols<=1?"rgba(118,118,128,0.06)":"#fff",color:mpNumCols<=1?C.label:C.text,fontSize:16,cursor:mpNumCols<=1?"default":"pointer",fontFamily:C.font,display:"flex",alignItems:"center",justifyContent:"center"}}></button>
              <div style={{width:30,height:30,borderRadius:8,background:"rgba(0,113,227,0.1)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:14,fontWeight:700,color:C.blue}}>{mpNumCols}</span>
              </div>
              <button onClick={()=>setMpNumCols(n=>Math.min(4,n+1))} disabled={mpNumCols>=4}
                style={{width:30,height:30,borderRadius:8,border:"1px solid "+C.border,background:mpNumCols>=4?"rgba(118,118,128,0.06)":"#fff",color:mpNumCols>=4?C.label:C.text,fontSize:16,cursor:mpNumCols>=4?"default":"pointer",fontFamily:C.font,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
            </div>
          </div>
        </div>
        <p style={{fontSize:14,color:C.label,marginBottom:16,lineHeight:1.6}}>Compare scenarios side by side  each column has its own rate, term, down payment and amortization.</p>

        {/* Shared top controls */}
        <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr 1fr",gap:10,marginBottom:4}}>
          <Field label="Purchase Price" hint={mpPriceOverride===0&&price>0?"From Inputs":mpPriceOverride>0?"Override":""}>
            <NumInput value={mpPriceOverride>0?mpPriceOverride:(price||0)} onChange={v=>setMpPriceOverride(v===price?0:v||0)} pre="$"/>
            <PriceSlider value={mpPriceOverride>0?mpPriceOverride:(price||100000)} onChange={v=>setMpPriceOverride(v===price?0:v)}/>
            {price>0&&mpPriceOverride>0&&(
              <button onClick={()=>setMpPriceOverride(0)}
                style={{marginTop:4,fontSize:12,color:C.blue,background:"rgba(0,113,227,0.08)",border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontFamily:C.font}}>
                Reset to {fCAD(price,0)}
              </button>
            )}
          </Field>
          <Field label="Payment Frequency">
            <Pills value={mpFreq} onChange={setMpFreq} options={MP_FREQS.map(x=>({key:x.key,label:x.label}))}/>
          </Field>
          <Field label="Compounding">
            <Pills value={mpComp} onChange={setMpComp} options={COMPOUNDS.map(x=>({key:x.key,label:x.label}))}/>
          </Field>
        </div>
        <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:10,marginBottom:20}}>
          <Field label="FTHB">
            <Pills value={mpFTHB} onChange={setMpFTHB} options={[{value:false,label:"No"},{value:true,label:"Yes (LTT rebate)"}]}/>
          </Field>
          <Field label="Location (LTT)">
            <Pills value={mpLocation} onChange={setMpLocation} options={[{value:"Other ON",label:"Ontario"},{value:"Toronto",label:"Toronto"}]}/>
          </Field>
        </div>

        {mpEffPrice<=0?(
          <InfoBox color="blue">Enter a purchase price above or set one in the Inputs tab.</InfoBox>
        ):(
          /*  Comparison table  */
          <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",marginLeft:mobile?-16:0,marginRight:mobile?-16:0,paddingLeft:mobile?16:0,paddingRight:mobile?16:0}}>
            <div style={{minWidth:mobile?"max-content":"100%"}}>
              {/* Column headers */}
              <div style={{display:"grid",gridTemplateColumns:mobile?"140px repeat("+mpNumCols+",120px)":"180px repeat("+mpNumCols+",1fr)",gap:8,marginBottom:8}}>
                {/* Row label header */}
                <div/>
                {activeCols2.map((col,i)=>(
                  <ColHeader key={i} col={col} i={i} calc={mpCalc[i]}/>
                ))}
              </div>

              {/* Data rows */}
              {rows.map((row,ri)=>(
                <div key={row.key} style={{
                  display:"grid",
                  gridTemplateColumns:mobile?"140px repeat("+mpNumCols+",120px)":"180px repeat("+mpNumCols+",1fr)",
                  gap:8,
                  marginBottom:row.dark?0:6,
                  marginTop:row.dark?6:0,
                }}>
                  {/* Row label */}
                  <div style={{
                    display:"flex",flexDirection:"column",justifyContent:"center",
                    padding:row.dark?"14px 0":"8px 0",
                    borderBottom:ri<rows.length-1?"1px solid "+C.border:"none",
                  }}>
                    <div style={{fontSize:mobile?12:13,fontWeight:row.dark?600:500,color:row.dark?C.text:C.label}}>{row.label}</div>
                    {row.sub&&<div style={{fontSize:10,color:C.label,opacity:0.7,marginTop:1}}>{row.sub}</div>}
                  </div>

                  {/* Data cells */}
                  {activeCols2.map((col,i)=>{
                    const calc=mpCalc[i];
                    const cellBg=row.dark?"linear-gradient(160deg,#1c1c1e,#2a2a2e)":row.green?"rgba(52,199,89,0.07)":row.accent?"rgba(255,149,0,0.07)":"rgba(118,118,128,0.06)";
                    const cellBorder=row.dark?"2px solid "+colColors[i]+"55":row.green?"1px solid rgba(52,199,89,0.2)":row.accent?"1px solid rgba(255,149,0,0.2)":"1px solid rgba(0,0,0,0.06)";
                    return(
                      <div key={i} style={{
                        background:cellBg,
                        border:cellBorder,
                        borderRadius:10,
                        padding:row.dark?"14px 10px":"10px 10px",
                        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                        textAlign:"center",
                        minHeight:row.dark?64:48,
                      }}>
                        {cellVal(row.key,calc)}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
            {mobile&&<div style={{fontSize:11,color:C.label,marginTop:8,paddingBottom:4}}> Scroll to compare all {mpNumCols} scenarios</div>}
          </div>
        )}

        <div style={{marginTop:16}}>
          <InfoBox color="blue">
            <div style={{fontSize:13,lineHeight:1.7}}>
              <strong>Term</strong> = how long your rate is locked in (e.g. 5yr fixed). <strong>Amortization</strong> = total repayment period. <strong>Balance at Renewal</strong> = what you'll owe when the term ends and you renegotiate your rate. Cash to close = down + LTT + ~1.5% closing costs.
            </div>
          </InfoBox>
        </div>
      </div>
    );
  })();

  //  Rate Compare state 
  const[rcPriceOverride,setRcPriceOverride]=useState(0);
  const[rcDownOverride,setRcDownOverride]=useState(0);
  const[rcTerm,setRcTerm]=useState(5);
  const[rcAmort,setRcAmort]=useState(25);
  const[rcComp,setRcComp]=useState("semi-annual");
  const[rcLenders,setRcLenders]=useState([
    {name:"Credit Union",rate:3.30,color:C.blue},
    {name:"Scotiabank",rate:3.50,color:C.purple},
  ]);
  function setRcLender(i,field,val){setRcLenders(prev=>prev.map((l,idx)=>idx===i?{...l,[field]:val}:l));}

  const rcEffPrice=rcPriceOverride>0?rcPriceOverride:price;
  const rcEffDown=rcDownOverride>0?rcDownOverride:(down>0?down:calcMinDown(rcEffPrice));

  const rcCalc=useMemo(()=>{
    if(rcEffPrice<=0)return null;
    const dn=Math.min(rcEffPrice*0.99,Math.max(rcEffDown,calcMinDown(rcEffPrice)));
    const dnPct=rcEffPrice>0?(dn/rcEffPrice)*100:0;
    const cmhcR=getCMHCRate(dnPct,rcAmort>25);
    const base=Math.max(0,rcEffPrice-dn);
    const cmhcAmt=base*cmhcR;
    const totalMtg=base+cmhcAmt;
    if(totalMtg<=0)return null;
    const n=rcAmort*12;
    const termMonths=rcTerm*12;
    return rcLenders.map(l=>{
      const rm=effRate(l.rate,rcComp);
      if(rm<=0)return null;
      const moPayment=(totalMtg*rm*Math.pow(1+rm,n))/(Math.pow(1+rm,n)-1);
      // Term breakdown
      let bal=totalMtg,termInt=0,termPrin=0;
      for(let i=0;i<termMonths&&bal>0.01;i++){
        const intM=bal*rm;
        const prinM=Math.min(moPayment-intM,bal);
        termInt+=intM;termPrin+=prinM;bal=Math.max(0,bal-prinM);
      }
      const balAtRenewal=Math.max(0,bal);
      const termTotalPaid=moPayment*termMonths;
      const totalPaid=moPayment*n;
      const totalInt=totalPaid-totalMtg;
      // First payment split
      const firstInt=totalMtg*rm;
      const firstPrin=Math.max(0,moPayment-firstInt);
      return{moPayment,termInt,termPrin,termTotalPaid,balAtRenewal,totalPaid,totalInt,firstInt,firstPrin,totalMtg,dn,dnPct,cmhcAmt,cmhcR};
    });
  },[rcEffPrice,rcEffDown,rcAmort,rcTerm,rcComp,rcLenders]);

  const RateComparePane=(()=>{
    const a=rcCalc&&rcCalc[0];
    const b=rcCalc&&rcCalc[1];
    const lA=rcLenders[0];
    const lB=rcLenders[1];
    const hasBoth=a&&b;
    // Savings: lender with lower payment vs higher
    const pmtDiff=hasBoth?Math.abs(a.moPayment-b.moPayment):0;
    const termIntDiff=hasBoth?Math.abs(a.termInt-b.termInt):0;
    const termPrinDiff=hasBoth?Math.abs(a.termPrin-b.termPrin):0;
    const lowerIdx=hasBoth?(a.moPayment<=b.moPayment?0:1):0;
    const lowerLender=rcLenders[lowerIdx];
    const higherLender=rcLenders[lowerIdx===0?1:0];

    function StatCompare({label,aVal,bVal,aFmt,bFmt,lowerIsBetter=true}){
      const aNum=typeof aVal==="number"?aVal:0;
      const bNum=typeof bVal==="number"?bVal:0;
      const aWins=lowerIsBetter?aNum<=bNum:aNum>=bNum;
      return(
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"center",padding:"10px 0",borderBottom:"1px solid "+C.border}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:mobile?15:17,fontWeight:700,color:aWins?C.green:C.text,letterSpacing:"-0.02em"}}>{aFmt||fCAD(aVal,0)}</div>
            {aWins&&<div style={{fontSize:10,color:C.green,fontWeight:600,marginTop:1}}> lower</div>}
          </div>
          <div style={{textAlign:"center",fontSize:11,color:C.label,fontWeight:500,whiteSpace:"nowrap",padding:"0 4px"}}>{label}</div>
          <div style={{textAlign:"left"}}>
            <div style={{fontSize:mobile?15:17,fontWeight:700,color:!aWins?C.green:C.text,letterSpacing:"-0.02em"}}>{bFmt||fCAD(bVal,0)}</div>
            {!aWins&&<div style={{fontSize:10,color:C.green,fontWeight:600,marginTop:1}}> lower</div>}
          </div>
        </div>
      );
    }

    return(
      <div style={{paddingBottom:16}}>
        <SectionTitle>Rate Compare</SectionTitle>
        <p style={{fontSize:14,color:C.label,marginBottom:20,lineHeight:1.6}}>Compare two lender rates side by side  see exactly how much your client saves per month, over the term, and what they owe at renewal.</p>

        {/* Shared inputs */}
        <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12,marginBottom:4}}>
          <Field label="Purchase Price" hint={rcPriceOverride===0&&price>0?"From Inputs":rcPriceOverride>0?"Override":""}>
            <NumInput value={rcPriceOverride>0?rcPriceOverride:(price||0)} onChange={v=>setRcPriceOverride(v===price?0:v||0)} pre="$"/>
            <PriceSlider value={rcPriceOverride>0?rcPriceOverride:(price||100000)} onChange={v=>setRcPriceOverride(v===price?0:v)}/>
          </Field>
          <Field label="Down Payment" hint={rcDownOverride===0&&down>0?"From Inputs":""}>
            <NumInput value={rcDownOverride>0?rcDownOverride:(down||0)} onChange={v=>setRcDownOverride(v||0)} pre="$"/>
            <div style={{display:"flex",gap:6,marginTop:8}}>
              {[{l:"Min",fn:()=>setRcDownOverride(Math.ceil(calcMinDown(rcEffPrice)))},{l:"10%",fn:()=>setRcDownOverride(Math.round(rcEffPrice*0.10))},{l:"20%",fn:()=>setRcDownOverride(Math.round(rcEffPrice*0.20))}].map(o=>(
                <button key={o.l} onClick={o.fn} disabled={rcEffPrice<=0}
                  style={{flex:1,height:34,borderRadius:9,border:"1px solid "+C.border,background:"rgba(118,118,128,0.09)",color:rcEffPrice>0?C.text:C.label,fontSize:13,fontWeight:500,cursor:rcEffPrice>0?"pointer":"default",fontFamily:C.font}}>
                  {o.l}
                </button>
              ))}
            </div>
          </Field>
        </div>
        <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr 1fr",gap:12,marginBottom:20}}>
          <Field label="Term">
            <Pills value={rcTerm} onChange={setRcTerm} options={[{value:3,label:"3yr"},{value:5,label:"5yr"},{value:7,label:"7yr"}]}/>
          </Field>
          <Field label="Amortization">
            <Pills value={rcAmort} onChange={setRcAmort} options={[{value:20,label:"20yr"},{value:25,label:"25yr"},{value:30,label:"30yr"}]}/>
          </Field>
          <Field label="Compounding">
            <Pills value={rcComp} onChange={setRcComp} options={[{key:"semi-annual",label:"Semi-Ann"},{key:"monthly",label:"Monthly"}].map(x=>({key:x.key,label:x.label}))}/>
          </Field>
        </div>

        {/* Lender cards */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
          {rcLenders.map((l,i)=>(
            <div key={i} style={{background:"rgba(118,118,128,0.06)",borderRadius:16,padding:"16px",border:"2px solid "+l.color+"33",position:"relative"}}>
              <div style={{position:"absolute",top:0,left:12,right:12,height:3,borderRadius:"0 0 4px 4px",background:l.color}}/>
              <input value={l.name} onChange={e=>setRcLender(i,"name",e.target.value)}
                style={{width:"100%",fontSize:13,fontWeight:700,color:l.color,background:"transparent",border:"none",outline:"none",fontFamily:C.font,marginBottom:12,marginTop:4}}/>
              <div style={{fontSize:11,color:C.label,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:6}}>Interest Rate</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{flex:1,display:"flex",alignItems:"center",height:44,background:"rgba(255,149,0,0.1)",border:"2px solid rgba(255,149,0,0.5)",borderRadius:12,overflow:"hidden"}}>
                  <input type="number" step="0.01" min="0.5" max="15" value={l.rate}
                    onChange={e=>setRcLender(i,"rate",Math.round(parseFloat(e.target.value||"0")*100)/100)}
                    style={{flex:1,border:"none",outline:"none",background:"transparent",fontSize:22,fontWeight:700,color:"#c47000",fontFamily:C.font,textAlign:"center",padding:"0 8px"}}/>
                  <span style={{padding:"0 12px",fontSize:14,color:"#c47000",fontWeight:700}}>%</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:3}}>
                  <button onClick={()=>setRcLender(i,"rate",Math.round((l.rate+0.05)*100)/100)}
                    style={{width:32,height:20,borderRadius:6,border:"1px solid rgba(255,149,0,0.35)",background:"rgba(255,149,0,0.12)",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:C.amber,fontWeight:700}}></button>
                  <button onClick={()=>setRcLender(i,"rate",Math.max(0.5,Math.round((l.rate-0.05)*100)/100))}
                    style={{width:32,height:20,borderRadius:6,border:"1px solid rgba(255,149,0,0.35)",background:"rgba(255,149,0,0.12)",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:C.amber,fontWeight:700}}></button>
                </div>
              </div>
              {rcCalc&&rcCalc[i]&&(
                <div style={{marginTop:10,fontSize:13,color:C.label}}>
                  Monthly: <span style={{fontWeight:700,color:l.color}}>{fCAD(rcCalc[i].moPayment,2)}</span>
                </div>
              )}
            </div>
          ))}
        </div>

        {rcEffPrice<=0?(
          <InfoBox color="blue">Enter a purchase price above or set one in the Inputs tab.</InfoBox>
        ):!hasBoth?(
          <InfoBox color="blue">Enter rates for both lenders to compare.</InfoBox>
        ):(
          <>
            {/* Hero savings banner */}
            <div style={{background:"linear-gradient(135deg,rgba(52,199,89,0.1),rgba(0,113,227,0.07))",border:"1px solid rgba(52,199,89,0.25)",borderRadius:16,padding:"18px 20px",marginBottom:20,borderLeft:"3px solid rgba(52,199,89,0.6)"}}>
              <div style={{fontSize:12,color:C.label,marginBottom:6,fontWeight:500}}>Choosing <span style={{color:lowerLender.color,fontWeight:700}}>{lowerLender.name}</span> ({(lowerIdx===0?lA:lB).rate.toFixed(2)}%) over <span style={{color:higherLender.color,fontWeight:700}}>{higherLender.name}</span> ({(lowerIdx===0?lB:lA).rate.toFixed(2)}%) saves:</div>
              <div style={{display:"flex",gap:mobile?16:32,flexWrap:"wrap"}}>
                <div>
                  <div style={{fontSize:11,color:C.label,marginBottom:2}}>Per Month</div>
                  <div style={{fontSize:mobile?24:30,fontWeight:700,color:C.green,letterSpacing:"-0.04em"}}>{fCAD(pmtDiff,2)}</div>
                </div>
                <div style={{width:1,background:C.border,flexShrink:0}}/>
                <div>
                  <div style={{fontSize:11,color:C.label,marginBottom:2}}>Over {rcTerm}-yr Term (interest)</div>
                  <div style={{fontSize:mobile?24:30,fontWeight:700,color:C.green,letterSpacing:"-0.04em"}}>{fCAD(termIntDiff,0)}</div>
                </div>
                <div style={{width:1,background:C.border,flexShrink:0}}/>
                <div>
                  <div style={{fontSize:11,color:C.label,marginBottom:2}}>Extra Principal Paid</div>
                  <div style={{fontSize:mobile?24:30,fontWeight:700,color:C.blue,letterSpacing:"-0.04em"}}>{fCAD(termPrinDiff,0)}</div>
                </div>
              </div>
            </div>

            {/* Column headers */}
            <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,marginBottom:4}}>
              <div style={{textAlign:"right",fontSize:14,fontWeight:700,color:lA.color,paddingRight:8,letterSpacing:"-0.01em"}}>{lA.name} <span style={{fontWeight:400,color:C.label}}> {lA.rate.toFixed(2)}%</span></div>
              <div/>
              <div style={{fontSize:14,fontWeight:700,color:lB.color,paddingLeft:8,letterSpacing:"-0.01em"}}>{lB.name} <span style={{fontWeight:400,color:C.label}}> {lB.rate.toFixed(2)}%</span></div>
            </div>

            {/* Comparison rows */}
            <StatCompare label="Monthly Payment" aVal={a.moPayment} bVal={b.moPayment} aFmt={fCAD(a.moPayment,2)} bFmt={fCAD(b.moPayment,2)}/>
            <StatCompare label={rcTerm+"yr Interest Paid"} aVal={a.termInt} bVal={b.termInt}/>
            <StatCompare label={rcTerm+"yr Principal Paid"} aVal={a.termPrin} bVal={b.termPrin} lowerIsBetter={false}/>
            <StatCompare label={rcTerm+"yr Total Paid"} aVal={a.termTotalPaid} bVal={b.termTotalPaid}/>
            <StatCompare label="Balance at Renewal" aVal={a.balAtRenewal} bVal={b.balAtRenewal}/>
            <StatCompare label="Total Interest (full)" aVal={a.totalInt} bVal={b.totalInt}/>

            {/* First payment donut comparison */}
            <Divider/>
            {/* Cost of choosing higher rate */}
            {(()=>{
              const extraPmtsOverTerm=pmtDiff*rcTerm*12;
              const interestLost=termIntDiff;
              const principalLost=termPrinDiff;
              const totalCost=interestLost+principalLost;
              return(
                <div style={{background:C.darkCard,borderRadius:18,padding:"22px 20px",marginBottom:20,boxShadow:"0 8px 32px rgba(0,0,0,0.18),inset 0 1px 0 rgba(255,255,255,0.05)"}}>
                  {/* Hero number */}
                  <div style={{marginBottom:20}}>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",fontWeight:500,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:6}}>
                      Cost of choosing <span style={{color:"#fff",fontWeight:700,opacity:0.9}}>{higherLender.name}</span> over <span style={{color:"rgba(255,255,255,0.6)",fontWeight:600}}>{lowerLender.name}</span>
                    </div>
                    <div style={{fontSize:mobile?36:44,fontWeight:700,color:C.red,letterSpacing:"-0.05em",lineHeight:1}}>{fCAD(totalCost,0)}</div>
                    <div style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginTop:6}}>total cost over {rcTerm}-year term  {lowerLender.rate.toFixed(2)}% vs {higherLender.rate.toFixed(2)}%</div>
                  </div>

                  {/* Three supporting stats */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:18}}>
                    <div style={{background:"rgba(255,255,255,0.06)",borderRadius:12,padding:"12px 10px",border:"1px solid "+C.borderDark,textAlign:"center"}}>
                      <div style={{fontSize:18,marginBottom:4}}></div>
                      <div style={{fontSize:mobile?16:18,fontWeight:700,color:C.amber,letterSpacing:"-0.03em"}}>{fCAD(extraPmtsOverTerm,0)}</div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:3,lineHeight:1.4}}>more out of pocket</div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:2}}>{fCAD(pmtDiff,2)}/mo  {rcTerm*12}</div>
                    </div>
                    <div style={{background:"rgba(255,59,48,0.12)",borderRadius:12,padding:"12px 10px",border:"1px solid rgba(255,59,48,0.2)",textAlign:"center"}}>
                      <div style={{fontSize:18,marginBottom:4}}></div>
                      <div style={{fontSize:mobile?16:18,fontWeight:700,color:C.red,letterSpacing:"-0.03em"}}>{fCAD(interestLost,0)}</div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:3,lineHeight:1.4}}>more in interest</div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:2}}>pure cost, not recovered</div>
                    </div>
                    <div style={{background:"rgba(0,113,227,0.12)",borderRadius:12,padding:"12px 10px",border:"1px solid rgba(0,113,227,0.2)",textAlign:"center"}}>
                      <div style={{fontSize:18,marginBottom:4}}></div>
                      <div style={{fontSize:mobile?16:18,fontWeight:700,color:C.onDarkBlue,letterSpacing:"-0.03em"}}>{fCAD(principalLost,0)}</div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:3,lineHeight:1.4}}>less equity built</div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:2}}>wealth impact</div>
                    </div>
                  </div>

                  {/* Plain language note */}
                  <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",lineHeight:1.7,borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:14}}>
                    Choosing <span style={{color:"rgba(255,255,255,0.85)",fontWeight:700}}>{higherLender.name}</span> costs <span style={{color:C.amber,fontWeight:600}}>{fCAD(extraPmtsOverTerm,0)}</span> more in payments over {rcTerm} years. Of that extra cash, <span style={{color:C.red,fontWeight:600}}>{fCAD(interestLost,0)}</span> goes to interest (gone forever) and you build <span style={{color:C.onDarkBlue,fontWeight:600}}>{fCAD(principalLost,0)}</span> less equity  for a true total cost of <span style={{color:C.red,fontWeight:600}}>{fCAD(totalCost,0)}</span>.
                  </div>
                </div>
              );
            })()}
            <SectionTitle>First Payment Breakdown</SectionTitle>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[{l:lA,d:a},{l:lB,d:b}].map(({l,d},i)=>{
                const tot=d.moPayment;
                const pPct=tot>0?(d.firstPrin/tot)*100:0;
                const iPct=100-pPct;
                return(
                  <div key={i} style={{background:"rgba(118,118,128,0.06)",borderRadius:14,padding:"14px",border:"1.5px solid "+l.color+"33"}}>
                    <div style={{fontSize:12,fontWeight:700,color:l.color,marginBottom:10}}>{l.name}</div>
                    <div style={{fontSize:mobile?18:22,fontWeight:700,color:C.text,letterSpacing:"-0.03em",marginBottom:12}}>{fCAD(tot,2)}<span style={{fontSize:11,fontWeight:400,color:C.label}}>/mo</span></div>
                    {/* Bar */}
                    <div style={{height:10,borderRadius:5,overflow:"hidden",display:"flex",marginBottom:8}}>
                      <div style={{width:pPct+"%",background:l.color,transition:"width 0.8s ease"}}/>
                      <div style={{flex:1,background:"rgba(255,59,48,0.6)"}}/>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                      <span style={{color:C.label}}>Principal <span style={{fontWeight:700,color:l.color}}>{fCAD(d.firstPrin,0)}</span></span>
                      <span style={{color:C.label}}>Interest <span style={{fontWeight:700,color:C.red}}>{fCAD(d.firstInt,0)}</span></span>
                    </div>
                  </div>
                );
              })}
            </div>

            <div style={{marginTop:16}}>
              <InfoBox color="blue">
                <div style={{fontSize:13,lineHeight:1.7}}>
                  Mortgage details: {fCAD(rcEffPrice,0)} purchase  {fCAD(rcEffDown,0)} down ({(rcEffDown/rcEffPrice*100).toFixed(1)}%)  {rcTerm}yr term  {rcAmort}yr amort  {rcComp} compounding.
                  {a.cmhcAmt>0&&<span> CMHC premium {fCAD(a.cmhcAmt,0)} included.</span>}
                </div>
              </InfoBox>
            </div>
          </>
        )}
      </div>
    );
  })();


  const TABS=[
    {key:"inputs",label:"Inputs"},
    {key:"results",label:"Results"},
    {key:"income",label:"Income Required"},
    {key:"payment",label:"Home Cost"},
    {key:"ltt",label:"Land Transfer Tax"},
    {key:"closing",label:"Closing Costs"},
    {key:"ratecompare",label:"Rate Compare"},
    {key:"rentbuy",label:"Rent vs Buy"},
    {key:"amort",label:"Amortization"},
    {key:"prepay",label:"Prepayment"},
    {key:"refi",label:"Refinance"},
    {key:"renewal",label:"Renewal Planner"},
  ];

  const paneMap={inputs:InputsPane,results:ResultsPane,income:IncomePane,payment:MpPane,ltt:LTTPane,closing:ClosingPane,rentbuy:RentBuyPane,amort:AmortPane,prepay:PrepayPane,refi:RefiPane,renewal:RenewalPane,ratecompare:RateComparePane};
  const showResultBar=tab==="inputs"||tab==="results";

  const GDSPill=<span style={{fontSize:mobile?11:12,fontWeight:600,padding:mobile?"3px 8px":"3px 10px",borderRadius:20,background:c.gdsPass?"rgba(52,199,89,0.12)":"rgba(255,59,48,0.12)",color:c.gdsPass?C.green:C.red,whiteSpace:"nowrap"}}>GDS {c.gds.toFixed(1)}%</span>;
  const TDSPill=<span style={{fontSize:mobile?11:12,fontWeight:600,padding:mobile?"3px 8px":"3px 10px",borderRadius:20,background:c.tdsPass?"rgba(52,199,89,0.12)":"rgba(255,59,48,0.12)",color:c.tdsPass?C.green:C.red,whiteSpace:"nowrap"}}>TDS {c.tds.toFixed(1)}%</span>;

  //  Desktop Layout 
  if(!mobile){
    const tabLabels={inputs:"Inputs",results:"Results",income:"Income Required",payment:"Home Cost",ltt:"Land Transfer Tax",closing:"Closing Costs",rentbuy:"Rent vs Buy",amort:"Amortization",prepay:"Prepayment",refi:"Refinance",renewal:"Renewal Planner",ratecompare:"Rate Compare"};
    const allTabs=["inputs","results","income","payment","ltt","closing","ratecompare","rentbuy","amort","prepay","refi","renewal"];
    return(
      <>
        {showSplash&&<SplashScreen onDone={()=>setShowSplash(false)}/>}
        {showHelp&&<HelpModal onClose={()=>setShowHelp(false)}/>}
        <div style={{fontFamily:C.font,background:C.bg,minHeight:"100vh",color:C.text,display:"flex",flexDirection:"column",backgroundImage:"radial-gradient(rgba(0,0,0,0.025) 1px,transparent 1px)",backgroundSize:"32px 32px"}}>
          <div style={{background:"rgba(255,255,255,0.92)",backdropFilter:"saturate(180%) blur(20px)",WebkitBackdropFilter:"saturate(180%) blur(20px)",borderBottom:"1px solid rgba(0,0,0,0.09)",position:"sticky",top:0,zIndex:100,overflowX:"hidden"}}>
            <div style={{maxWidth:1200,margin:"0 auto",padding:"0 32px",height:48,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <img src={NEEL_PHOTO} alt="Neel Idnani" style={{width:30,height:30,borderRadius:"50%",objectFit:"cover",objectPosition:"center center",flexShrink:0,border:"1.5px solid rgba(0,0,0,0.08)"}}/>
                <span style={{fontSize:15,fontWeight:600,color:C.text,letterSpacing:"-0.02em"}}>Mortgage <span style={{fontWeight:400,color:C.label}}>Qualifier</span></span>
                <div style={{display:"flex",gap:6,marginLeft:8}}>{GDSPill}{TDSPill}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={handleReset} style={{padding:"5px 14px",borderRadius:20,border:"1px solid "+(resetFlash?C.green:C.border),background:resetFlash?"rgba(52,199,89,0.1)":"transparent",fontSize:13,color:resetFlash?C.green:C.label,cursor:"pointer",fontFamily:C.font,transition:"all 0.3s"}}>{resetFlash?"Cleared":"Reset"}</button>
                <button onClick={()=>setShowHelp(true)} style={{width:32,height:32,borderRadius:"50%",border:"1px solid "+C.border,background:"rgba(118,118,128,0.1)",fontSize:14,color:C.label,cursor:"pointer",fontFamily:C.font,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:600}}>?</button>
                <a href={VELOCITY} target="_blank" rel="noopener noreferrer"
                  style={{padding:"6px 18px",borderRadius:20,background:"linear-gradient(180deg,#147CE5,#0071e3)",fontSize:13,fontWeight:600,color:"#fff",textDecoration:"none",boxShadow:"0 1px 0 rgba(255,255,255,0.2) inset"}}>Apply Now</a>
              </div>
            </div>
            <div style={{maxWidth:1200,margin:"0 auto",padding:"0 32px",borderTop:"1px solid "+C.border,display:"flex",overflowX:"auto",scrollbarWidth:"none"}}>
              {allTabs.map(k=>(
                <button key={k} onClick={()=>switchTab(k)}
                  style={{flexShrink:0,padding:"10px 16px",border:"none",background:"transparent",fontFamily:C.font,fontSize:13,fontWeight:tab===k?600:400,color:tab===k?C.text:C.label,borderBottom:"2px solid "+(tab===k?C.text:"transparent"),cursor:"pointer",transition:"all 0.18s",whiteSpace:"nowrap",letterSpacing:"-0.01em"}}>
                  {tabLabels[k]}
                </button>
              ))}
            </div>
          </div>
          <div style={{flex:1,maxWidth:1200,width:"100%",margin:"0 auto",padding:"32px 32px 60px"}}>
            <div style={{background:C.surface,borderRadius:24,padding:"28px 32px",boxShadow:"0 1px 0 rgba(0,0,0,0.05),0 4px 24px rgba(0,0,0,0.07)"}}>
              {paneMap[tab]}
            </div>
          </div>
          {showResultBar&&<ResultBar c={c} selPmt={selPmt} payFreq={payFreq} downMissing={downMissing} gdsMax={gdsMax} tdsMax={tdsMax} rate={rate} amort={amort} term={term}/>}
          {Footer}
        </div>
      </>
    );
  }

  //  Mobile Layout 
  return(
    <>
      {showSplash&&<SplashScreen onDone={()=>setShowSplash(false)}/>}
      {showHelp&&<HelpModal onClose={()=>setShowHelp(false)}/>}
      <div style={{fontFamily:C.font,background:C.bg,color:C.text,maxWidth:"100vw",overflowX:"hidden",minHeight:"100vh",display:"flex",flexDirection:"column",backgroundImage:"radial-gradient(rgba(0,0,0,0.025) 1px,transparent 1px)",backgroundSize:"32px 32px"}}>
        <div style={{background:"rgba(249,249,249,0.94)",backdropFilter:"saturate(180%) blur(20px)",WebkitBackdropFilter:"saturate(180%) blur(20px)",borderBottom:"1px solid rgba(0,0,0,0.09)",position:"sticky",top:0,zIndex:100,overflowX:"hidden"}}>
          <div style={{padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <img src={NEEL_PHOTO} alt="Neel Idnani" style={{width:30,height:30,borderRadius:"50%",objectFit:"cover",objectPosition:"center center",flexShrink:0,border:"1.5px solid rgba(0,0,0,0.08)"}}/>
              <span style={{fontSize:15,fontWeight:600,letterSpacing:"-0.02em",whiteSpace:"nowrap"}}>Mortgage Qualifier</span>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button onClick={handleReset} style={{padding:"5px 14px",borderRadius:20,border:"1px solid "+(resetFlash?C.green:C.border),background:resetFlash?"rgba(52,199,89,0.1)":"transparent",fontSize:13,color:resetFlash?C.green:C.label,cursor:"pointer",fontFamily:C.font,transition:"all 0.3s"}}>{resetFlash?"Cleared":"Reset"}</button>
              <button onClick={()=>setShowHelp(true)} style={{width:30,height:30,borderRadius:"50%",border:"1px solid "+C.border,background:"rgba(118,118,128,0.1)",fontSize:14,color:C.label,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:600}}>?</button>
              <a href={VELOCITY} target="_blank" rel="noopener noreferrer"
                style={{padding:"5px 14px",borderRadius:20,background:"linear-gradient(180deg,#147CE5,#0071e3)",fontSize:13,fontWeight:600,color:"#fff",textDecoration:"none",boxShadow:"0 1px 0 rgba(255,255,255,0.2) inset"}}>Apply</a>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",borderTop:"1px solid "+C.border}}>
            <div style={{display:"flex",overflowX:"auto",overflowY:"hidden",WebkitOverflowScrolling:"touch",msOverflowStyle:"none",scrollbarWidth:"none",flex:1,minHeight:40}}>
              {TABS.map(t=>(
                <button key={t.key} onClick={()=>switchTab(t.key)}
                  style={{flexShrink:0,padding:"10px 14px",border:"none",background:"transparent",fontFamily:C.font,fontSize:13,fontWeight:tab===t.key?600:400,color:tab===t.key?C.text:C.label,borderBottom:"2px solid "+(tab===t.key?C.text:"transparent"),cursor:"pointer",transition:"all 0.18s",whiteSpace:"nowrap",WebkitTapHighlightColor:"transparent",letterSpacing:"-0.01em"}}>
                  {t.label}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:4,padding:"0 10px",flexShrink:0,borderLeft:"1px solid "+C.border}}>
              {GDSPill}{TDSPill}
            </div>
          </div>
        </div>

        <div style={{flex:1,padding:"20px 16px 24px"}}>
          {paneMap[tab]}
        </div>

        {showResultBar&&(
          <div style={{position:"sticky",bottom:0,zIndex:99}}>
            <ResultBar c={c} selPmt={selPmt} payFreq={payFreq} downMissing={downMissing} gdsMax={gdsMax} tdsMax={tdsMax} rate={rate} amort={amort} term={term}/>
          </div>
        )}
        {Footer}
      </div>
    </>
  );
}

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
