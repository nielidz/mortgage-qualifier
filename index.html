<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1d1d1f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Mortgage Qualifier — Neel Idnani</title>
    <meta name="description" content="Mortgage qualification calculator by Neel Idnani, Mortgage Agent Level 1, Dominion Lending Centres FC Funding." />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #f5f5f7; }
      body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
      input[type=number] { -moz-appearance: textfield; }
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-type="module" src="./mortgage-eligibility.jsx"></script>
    <script>
      // Mount after Babel compiles
      document.addEventListener("DOMContentLoaded", function() {
        setTimeout(function() {
          try {
            const root = ReactDOM.createRoot(document.getElementById("root"));
            root.render(React.createElement(App));
          } catch(e) {
            console.error("Mount error:", e);
          }
        }, 500);
      });
    </script>
  </body>
</html>
