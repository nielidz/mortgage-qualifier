  <script>
    // Animate progress bar while loading
    let p=0;const pb=document.getElementById("progress-bar");
    const iv=setInterval(()=>{p=Math.min(p+(Math.random()*8+2),90);pb.style.width=p+"%";},150);
    window.__hidePreloader=function(){
      clearInterval(iv);pb.style.width="100%";
      setTimeout(()=>{const el=document.getElementById("preloader");if(el){el.style.opacity="0";setTimeout(()=>el.remove(),400);}},200);
    };
  </script>

      }

//  Math helpers 
function fCAD(v,d=0){return new Intl.NumberFormat("en-CA",{style:"currency",currency:"CAD",minimumFractionDigits:d,maximumFractionDigits:d}).format(v||0);}
function fPct(v,d=2){return v.toFixed(d)+"%";}
function calcMinDown(p){if(p<=0)return 0;if(p<=500000)return p*0.05;if(p<1500000)return 25000+(p-500000)*0.10;return p*0.20;}
function getCMHCRate(pct,is30){const s=is30?0.002:0;if(pct>=20)return 0;if(pct>=15)return 0.028+s;if(pct>=10)return 0.031+s;if(pct>=5)return 0.040+s;return 0;}
function effRate(annual,comp){const r=annual/100;if(comp==="monthly")return r/12;if(comp==="annual")return Math.pow(1+r,1/12)-1;if(comp==="quarterly")return Math.pow(1+r/4,1/3)-1;return Math.pow(1+r/2,1/6)-1;}
function mtgPmt(P,rate,yrs,comp){if(P<=0||rate<=0)return 0;const rm=effRate(rate,comp),n=yrs*12;return(P*rm*Math.pow(1+rm,n))/(Math.pow(1+rm,n)-1);}
function allPmts(P,rate,yrs,comp){if(P<=0||rate<=0)return{monthly:0,semiMonthly:0,biweekly:0,accelBiweekly:0,weekly:0,accelWeekly:0};const rm=effRate(rate,comp),n=yrs*12,mo=(P*rm*Math.pow(1+rm,n))/(Math.pow(1+rm,n)-1);return{monthly:mo,semiMonthly:mo/2,biweekly:mo*12/26,accelBiweekly:mo/2,weekly:mo*12/52,accelWeekly:mo/4};}
function toMo(a,f){return f==="biweekly"?(a*26)/12:a;}
function calcOntarioLTT(price,fthb){let tax=0;if(price<=55000)tax=price*0.005;else if(price<=250000)tax=275+(price-55000)*0.010;else if(price<=400000)tax=2225+(price-250000)*0.015;else if(price<=2000000)tax=4475+(price-400000)*0.020;else tax=36475+(price-2000000)*0.025;const rebate=fthb?Math.min(tax,4000):0;return{tax,rebate,net:tax-rebate};}
function calcTorontoLTT(price,fthb){let tax=0;if(price<=55000)tax=price*0.005;else if(price<=400000)tax=275+(price-55000)*0.010;else if(price<=40000000)tax=3725+(price-400000)*0.020;else tax=795725+(price-40000000)*0.025;const rebate=fthb?Math.min(tax,4475):0;return{tax,rebate,net:tax-rebate};}

function NumInput({value,onChange,pre,suf,ph="0",readOnly,highlight}){

  const borderColor=highlight?C.red:f?C.blue:"transparent";
  const displayVal=f?raw:(value?(isDecimal?String(value):value.toLocaleString("en-CA")):"");
  function handleFocus(){setF(true);setRaw(value?String(value):"");}
  function handleBlur(){setF(false);setRaw("");}
  function handleChange(e){
    const v=e.target.value;
    setRaw(v);

function MortgageSummary({principal,totalPaid,totalMtg,termInt,termPrin,termTotalPaid,balAtRenewal,moPayment,term,rate,amort,mobile}){
  if(!moPayment||moPayment<=0||!totalMtg||totalMtg<=0)return null;
  const[activeTab,setActiveTab]=useState("payment");
  const[animated,setAnimated]=useState(false);
  useEffect(()=>{setAnimated(false);const t=setTimeout(()=>setAnimated(true),80);return()=>clearTimeout(t);},[activeTab,principal,totalPaid,termInt]);

  // SVG donut helpers
  const size=mobile?160:180;
  const cx=size/2, cy=size/2;
  const R=mobile?60:68;
  const strokeW=mobile?18:20;
  const startAngle=225*(Math.PI/180);
  const sweepAngle=270*(Math.PI/180);

  function arcPath(start,sweep,r){
    if(sweep<=0)return"";
    const ex=cx+r*Math.cos(start+sweep);
    const ey=cy+r*Math.sin(start+sweep);
    const sx=cx+r*Math.cos(start);
    const sy=cy+r*Math.sin(start);
    const large=sweep>Math.PI?1:0;
    return `M ${sx} ${sy} A ${r} ${r} 0 ${large} 1 ${ex} ${ey}`;
  }

  // Data per tab
  const tabs={
    payment:{
      label:"Payment",
      blue:principal>0?moPayment>0?(moPayment-(moPayment*(principal/(principal>0?principal:1)))):0:0,
      // first payment: interest portion = principal * monthly rate
      // We'll compute properly below
      centerLabel:"Monthly",
      centerVal:fCAD(moPayment,2),
    },
    term:{
      label:"Term",
      centerLabel:term+"yr Term",
      centerVal:fCAD(termTotalPaid,0),
    },
    total:{
      label:"Full Amort",
      centerLabel:amort+"yr Total",
      centerVal:fCAD(totalPaid,0),
    },
  };

  // Compute first payment split
  const rm=totalMtg>0&&rate>0?((Math.pow(1+rate/200,1/6)-1)):0;
  const firstInt=totalMtg*rm;
  const firstPrin=Math.max(0,moPayment-firstInt);

  let blueAmt, redAmt, blueLabel, redLabel, blueColor, extraStats;
  if(activeTab==="payment"){
    blueAmt=firstPrin;
    redAmt=firstInt;
    blueLabel="Principal";
    redLabel="Interest";
    blueColor=C.blue;
    extraStats=[
      {label:"Total Payment",val:fCAD(moPayment,2),color:C.text},
      {label:"Principal Paid",val:fCAD(firstPrin,2),color:C.blue},
      {label:"Interest Paid",val:fCAD(firstInt,2),color:C.red},
    ];
  } else if(activeTab==="term"){
    blueAmt=termPrin;
    redAmt=termInt;
    blueLabel="Principal";
    redLabel="Interest";
    blueColor=C.blue;
    extraStats=[
      {label:"Total Paid",val:fCAD(termTotalPaid,0),color:C.text},
      {label:"Principal Paid",val:fCAD(termPrin,0),color:C.blue},
      {label:"Interest Paid",val:fCAD(termInt,0),color:C.red},
      {label:"Balance at Renewal",val:fCAD(balAtRenewal,0),color:C.amber},
    ];
  } else {
    blueAmt=totalMtg;
    redAmt=Math.max(0,totalPaid-totalMtg);
    blueLabel="Principal";
    redLabel="Interest";
    blueColor=C.blue;
    extraStats=[
      {label:"Total Paid",val:fCAD(totalPaid,0),color:C.text},
      {label:"Principal",val:fCAD(totalMtg,0),color:C.blue},
      {label:"Total Interest",val:fCAD(Math.max(0,totalPaid-totalMtg),0),color:C.red},
    ];
  }

  const total=blueAmt+redAmt;
  const bluePct=total>0?blueAmt/total:0;
  const blueSweep=sweepAngle*bluePct;

  return(
    <div>
      {/* Tab switcher */}
      <div style={{display:"flex",background:"rgba(118,118,128,0.12)",borderRadius:12,padding:3,gap:2,marginBottom:16}}>
        {[{k:"payment",l:"Payment Summary"},{k:"term",l:"Term"},{k:"total",l:"Total"}].map(t=>(
          <button key={t.k} onClick={()=>setActiveTab(t.k)}
            style={{flex:1,padding:"9px 4px",borderRadius:8,border:"none",cursor:"pointer",background:activeTab===t.k?C.surface:"transparent",boxShadow:activeTab===t.k?"0 1px 2px rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.08)":"none",color:activeTab===t.k?C.text:C.label,fontWeight:activeTab===t.k?600:400,fontSize:13,fontFamily:C.font,transition:"all 0.2s",letterSpacing:"-0.01em"}}>
            {t.l}
          </button>
        ))}
      </div>

      {/* Donut + stats */}
      <div style={{display:"flex",flexDirection:mobile?"column":"row",alignItems:"center",gap:mobile?12:24}}>
        {/* Donut */}
        <div style={{position:"relative",flexShrink:0}}>
          <svg width={size} height={size} style={{display:"block"}}>
            <path d={arcPath(startAngle,sweepAngle,R)} fill="none" stroke="rgba(0,0,0,0.07)" strokeWidth={strokeW} strokeLinecap="round"/>
            <path d={arcPath(startAngle+blueSweep,animated?sweepAngle-blueSweep:0,R)}
              fill="none" stroke="rgba(255,59,48,0.8)" strokeWidth={strokeW} strokeLinecap="round"
              style={{transition:"d 0.9s cubic-bezier(0.4,0,0.2,1)"}}/>
            <path d={arcPath(startAngle,animated?blueSweep:0,R)}
              fill="none" stroke={blueColor} strokeWidth={strokeW} strokeLinecap="round"
              style={{transition:"d 0.9s cubic-bezier(0.4,0,0.2,1)"}}/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",paddingBottom:mobile?8:12}}>
            <div style={{fontSize:10,color:C.label,fontWeight:500,textTransform:"uppercase",letterSpacing:"0.03em",marginBottom:2}}>{tabs[activeTab].centerLabel}</div>
            <div style={{fontSize:mobile?14:16,fontWeight:700,color:C.text,letterSpacing:"-0.03em",lineHeight:1,textAlign:"center"}}>{tabs[activeTab].centerVal}</div>
          </div>
        </div>

        {/* Stats */}
        <div style={{flex:1,minWidth:0}}>
          {extraStats.map((s,i) => (
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:i<extraStats.length-1?"1px solid "+C.border:"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:8,height:8,borderRadius:2,background:s.color===C.text?"rgba(0,0,0,0.2)":s.color,flexShrink:0}}/>
                <span style={{fontSize:13,color:C.label}}>{s.label}</span>
              </div>
              <span style={{fontSize:15,fontWeight:700,color:s.color,letterSpacing:"-0.02em"}}>{s.val}</span>
            </div>
          ))}
          {activeTab==="payment"&&(
            <div style={{marginTop:10,fontSize:11,color:C.label,lineHeight:1.5,background:"rgba(118,118,128,0.06)",borderRadius:8,padding:"8px 10px"}}>
              First payment breakdown at {rate.toFixed(2)}%  as principal reduces, each payment shifts more toward principal.
            </div>
          )}
          {activeTab==="term"&&(
            <div style={{marginTop:10,fontSize:11,color:C.amber,lineHeight:1.5,background:"rgba(255,149,0,0.07)",borderRadius:8,padding:"8px 10px",borderLeft:"2px solid rgba(255,149,0,0.4)"}}>
              Balance at renewal is what you'll owe when your {term}-year term ends and you renegotiate your rate.
            </div>
          )}
          {activeTab==="total"&&(
            <div style={{marginTop:10,fontSize:11,color:C.label,lineHeight:1.5,background:"rgba(118,118,128,0.06)",borderRadius:8,padding:"8px 10px"}}>
              Total interest over {amort} years at {rate.toFixed(2)}%. Accelerated payments can significantly reduce this.
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function FreqSavings({totalMtg,rate,compound,amort,mobile}){
  if(totalMtg<=0||rate<=0||amort<=0)return null;
  // Calculate payoff months for monthly vs accel biweekly
  function payoffMonths(P,r,comp,extraPerMo){
    const rm=effRate(r,comp);
    const n=amort*12;
    const regPmt=(P*rm*Math.pow(1+rm,n))/(Math.pow(1+rm,n)-1);
    const pmt=regPmt+extraPerMo;
    if(pmt<=P*rm)return{months:n,interest:regPmt*n-P,pmt:regPmt};
    let bal=P,months=0,totalInt=0;
    while(bal>0.01&&months<n*2){
      const intM=bal*rm;
      const prinM=Math.min(pmt-intM,bal);
      totalInt+=intM;
      bal-=prinM;
      months++;
    }
    return{months,interest:totalInt,pmt};
  }
  const monthly=payoffMonths(totalMtg,rate,compound,0);
  // Accel biweekly = 26 payments/yr each = monthly/2, so extra per month = monthly.pmt/12
  const accelExtraPerMo=monthly.pmt/12;
  const accel=payoffMonths(totalMtg,rate,compound,accelExtraPerMo);
  const intSaved=monthly.interest-accel.interest;
  const yrsSaved=(monthly.months-accel.months)/12;
  if(intSaved<=0)return null;

  const barPct=Math.min(100,Math.max(5,(intSaved/monthly.interest)*100));
  const [animated,setAnimated]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setAnimated(true),200);return()=>clearTimeout(t);},[totalMtg,rate,amort]);

  return(
    <div style={{background:"linear-gradient(135deg,rgba(52,199,89,0.07),rgba(0,113,227,0.05))",border:"1px solid rgba(52,199,89,0.2)",borderRadius:16,padding:"18px 20px",borderLeft:"3px solid rgba(52,199,89,0.5)"}}>
      <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:2,letterSpacing:"-0.01em"}}> Switch to Accelerated Bi-Weekly</div>
      <div style={{fontSize:12,color:C.label,marginBottom:14}}>vs. Monthly payments</div>
      <div style={{display:"flex",gap:mobile?12:24,flexWrap:"wrap",marginBottom:16}}>
        <div>
          <div style={{fontSize:11,color:C.label,marginBottom:2}}>Interest Saved</div>
          <div style={{fontSize:mobile?22:26,fontWeight:700,color:C.green,letterSpacing:"-0.04em"}}>{fCAD(intSaved,0)}</div>
        </div>
        <div style={{width:1,background:C.border,flexShrink:0}}/>
        <div>
          <div style={{fontSize:11,color:C.label,marginBottom:2}}>Paid Off Sooner</div>
          <div style={{fontSize:mobile?22:26,fontWeight:700,color:C.blue,letterSpacing:"-0.04em"}}>{yrsSaved.toFixed(1)} <span style={{fontSize:14,fontWeight:500}}>yrs</span></div>
        </div>
      </div>
      {/* Progress bar showing interest reduction */}
      <div style={{marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{fontSize:11,color:C.label}}>Monthly interest</span>
          <span style={{fontSize:11,color:C.label}}>Accel BW interest</span>
        </div>
        <div style={{height:8,background:"rgba(255,59,48,0.15)",borderRadius:4,overflow:"hidden"}}>
          <div style={{height:"100%",width:animated?((1-barPct/100)*100)+"%":"100%",background:"rgba(52,199,89,0.6)",borderRadius:4,transition:"width 1.2s cubic-bezier(0.4,0,0.2,1)"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
          <span style={{fontSize:11,color:C.red,fontWeight:500}}>{fCAD(monthly.interest,0)}</span>
          <span style={{fontSize:11,color:C.green,fontWeight:500}}>{fCAD(accel.interest,0)}</span>
        </div>
      </div>
      <div style={{fontSize:11,color:C.label,marginTop:6,lineHeight:1.5,opacity:0.8}}>Each accel BW payment = half your monthly amount, made 26/yr  the equivalent of one extra month of payments per year.</div>
    </div>
  );
}

          </div>
        </div>
      </div>
    </div>
  );
}

  },[income,coIncome,rental,price,down,rate,amort,term,isFTHB,compound,taxMode,tax,condo,heat,carAmt,carFreq,studMode,studPmt,studFreq,studBal,ccBal,otherAmt,otherFreq,payFreq]);

  function handleFTHB(v){setIsFTHB(v);setAmort(v?30:25);}
  function handleReset(){
    setIncome(0);setCoIncome(0);setRental(0);setPrice(0);setDown(0);
    setRate(4.5);setRateBase(4.5);setRateSensOffset(0);setAmort(30);setTerm(5);setIsFTHB(true);setCompound("semi-annual");
    setTaxMode("annual");setTax(5000);setCondo(0);setHeat(100);
    setCarAmt(0);setCarFreq("monthly");setStudMode("payment");
    setStudPmt(0);setStudFreq("monthly");setStudBal(0);

    setMpCols([{downPct:5,downAmt$:0,downMode:"%",amort:30,rate:4.5,term:5,label:"Scenario A"},{downPct:20,downAmt$:0,downMode:"%",amort:25,rate:4.75,term:5,label:"Scenario B"},{downPct:10,downAmt$:0,downMode:"%",amort:25,rate:5.0,term:3,label:"Scenario C"},{downPct:15,downAmt$:0,downMode:"%",amort:25,rate:5.25,term:5,label:"Scenario D"}]);

    setRfBalance(0);setRfCurrentRate(0);setRfNewRate(0);setRfAmort(25);setRfPenalty(0);setRfComp("semi-annual");
    setRnBalance(0);setRnCurrentRate(0);setRnNewRate(0);setRnAmort(20);setRnRenewalDate("");setRnComp("semi-annual");

    setRcLenders([{name:"Credit Union",rate:3.30,color:C.blue},{name:"Scotiabank",rate:3.50,color:C.purple}]);
    setTab("inputs");setResetFlash(true);
    setTimeout(()=>setResetFlash(false),1200);
    lsSet("mqState",null);
  }

  //  Qualifier calc 
  const c=useMemo(()=>{
    const grossMo=(income+coIncome)/12;
    // Subject property rental: 50% add-back to income (CMHC/lender standard)
    // Existing rental property: full rental income added, but existing mortgage payment also added to TDS
    const rentAdd=rentalType==="subject"?rental*0.5:rental*0.5; // both 50% for now per B-20; existing rental full calc requires separate mortgage input
    const qualMo=grossMo+rentAdd;
    const downPct=price>0?(down/price)*100:0;
    const cmhcRate=getCMHCRate(downPct,is30);
    const baseMtg=Math.max(0,price-down);
    const cmhcAmt=baseMtg*cmhcRate;
    const totalMtg=baseMtg+cmhcAmt;
    const stressR=Math.max(rate+2,5.25);
    const qualPmt=mtgPmt(totalMtg,stressR,amort,"semi-annual");
    const pmts=allPmts(totalMtg,rate,amort,compound);
    const moTax=taxMode==="annual"?tax/12:tax;
    const condoC=condo*0.5;
    const carM=toMo(carAmt,carFreq);
    const studM=studMode==="balance"?studBal*0.01:toMo(studPmt,studFreq);
    const ccM=ccBal*0.03;
    const extraM=extraDebts.reduce((s,d)=>s+toMo(d.amt||0,d.freq||"monthly"),0);
    const othM=toMo(otherAmt,otherFreq)+extraM;
    const gdsN=qualPmt+moTax+heat+condoC;
    const tdsN=gdsN+carM+studM+ccM+othM;
    const gds=qualMo>0?(gdsN/qualMo)*100:0;
    const tds=qualMo>0?(tdsN/qualMo)*100:0;
    const rm=effRate(stressR,"semi-annual");
    const n=amort*12;
    const avail=qualMo*(tdsMax/100)-carM-studM-ccM-othM-moTax-heat-condoC;
    const maxB=avail>0&&rm>0?(avail*(Math.pow(1+rm,n)-1))/(rm*Math.pow(1+rm,n)):0;
    const maxMtg=cmhcRate>0?maxB/(1+cmhcRate):maxB;
    const incNeeded=Math.max(gdsN/(gdsMax/100),tdsN/(tdsMax/100))*12;
    const minDown=calcMinDown(price);
    let incReqForTarget=0;
    if(targetPrice>0){
      const td=targetDown>0?targetDown:calcMinDown(targetPrice);
      const tdPct=td/targetPrice*100;
      const tcmhc=getCMHCRate(tdPct,is30);
      const tbM=Math.max(0,targetPrice-td);
      const tTot=tbM*(1+tcmhc);
      const tPmt=mtgPmt(tTot,stressR,amort,"semi-annual");
      const tGds=tPmt+moTax+heat+condoC;
      const tTds=tGds+carM+studM+ccM+othM;
      incReqForTarget=Math.max(tGds/(gdsMax/100),tTds/(tdsMax/100))*12;
    }
    const scenarios=[5,10,15,20].map(pct=>{
      const sd=Math.round(price*pct/100);
      const scmhc=getCMHCRate(pct,is30);
      const sbM=Math.max(0,price-sd);
      const sTot=sbM*(1+scmhc);
      const sPmt=mtgPmt(sTot,stressR,amort,"semi-annual");
      const sActual=allPmts(sTot,rate,amort,compound).monthly;
      const sGdsN=sPmt+moTax+heat+condoC;
      const sTdsN=sGdsN+carM+studM+ccM+othM;
      const sGds=qualMo>0?(sGdsN/qualMo)*100:0;
      const sTds=qualMo>0?(sTdsN/qualMo)*100:0;
      return{pct,down:sd,cmhcPct:scmhc*100,totalMtg:sTot,actualMonthly:sActual,gds:sGds,tds:sTds,gdsPass:sGds<=gdsMax,tdsPass:sTds<=tdsMax};
    });
    const minDownPct=price>0?(calcMinDown(price)/price)*100:5;
    const eligible=price>0&&gds<=gdsMax&&tds<=tdsMax&&downPct>=minDownPct;
    // Max purchase price at min down (iterative solve)
    const moTaxForMax=tax>0?(taxMode==="annual"?tax/12:tax):0;
    const heatForMax=heat>0?heat:100;
    let maxPrice=0;
    let mpGuess=qualMo*12*5;
    for(let i=0;i<15;i++){
      const moTaxEst=moTaxForMax>0?moTaxForMax:mpGuess*0.01/12;
      const gdsAvail=qualMo*((gdsMax-0.25)/100)-moTaxEst-heatForMax-condoC;
      const tdsAvail=qualMo*((tdsMax-0.25)/100)-moTaxEst-heatForMax-condoC-carM-studM-ccM-othM;
      const avail=Math.min(gdsAvail,tdsAvail);
      if(avail<=0)break;
      const mMtg=(avail*(Math.pow(1+rm,n)-1))/(rm*Math.pow(1+rm,n));
      const minDownAmt=calcMinDown(mpGuess);
      const minDownPctG=minDownAmt/mpGuess;
      const cmhcRG=getCMHCRate(minDownPctG*100,is30);
      const newP=(mMtg/(1+cmhcRG))+minDownAmt;
      if(Math.abs(newP-mpGuess)<50){maxPrice=newP;break;}
      mpGuess=(newP+mpGuess)/2;
      maxPrice=newP;
    }
    // Term calculations
    const termMonths=term*12;
    const rm2=effRate(rate,compound);
    const n2=amort*12;
    const moPmt=c=>c.pmts?c.pmts.monthly:0;
    const actualMoPmt=totalMtg>0&&rm2>0?(totalMtg*rm2*Math.pow(1+rm2,n2))/(Math.pow(1+rm2,n2)-1):0;
    let bal2=totalMtg,termInt=0,termPrin=0;
    for(let i=0;i<Math.min(termMonths,n2)&&bal2>0.01;i++){
      const intM=bal2*rm2;const prinM=Math.min(actualMoPmt-intM,bal2);
      termInt+=intM;termPrin+=prinM;bal2=Math.max(0,bal2-prinM);
    }
    const termTotalPaid=actualMoPmt*Math.min(termMonths,n2);
    const balAtRenewal=Math.max(0,bal2);
    return{price,qualMo,downPct,cmhcRate,cmhcAmt,baseMtg,totalMtg,stressR,qualPmt,pmts,moTax,heat,condoC,carM,studM,ccM,othM,gdsN,tdsN,gds,tds,gdsPass:gds<=gdsMax,tdsPass:tds<=tdsMax,eligible,maxMtg,maxPrice,incNeeded,minDown,incReqForTarget,scenarios,termInt,termPrin,termTotalPaid,balAtRenewal,actualMoPmt};
  },[income,coIncome,rental,rentalType,price,down,rate,amort,term,compound,tax,taxMode,condo,heat,carAmt,carFreq,studMode,studPmt,studFreq,studBal,ccBal,otherAmt,otherFreq,extraDebts,is30,targetPrice,targetDown,gdsMax,tdsMax]);

  const selPmt=c.pmts[payFreq]||0;
  const downMissing=c.price>0&&c.downPct<(calcMinDown(c.price)/c.price*100);

  //  Derived calcs 
  // LTT uses price from Inputs
  const lttEffPrice=lttPriceOverride>0?lttPriceOverride:price;
  const ltt=useMemo(()=>{
    if(lttEffPrice<=0)return null;
    const ontario=calcOntarioLTT(lttEffPrice,lttFTHB);
    const toronto=lttToronto?calcTorontoLTT(lttEffPrice,lttFTHB):{tax:0,rebate:0,net:0};
    return{ontario,toronto,total:ontario.net+toronto.net};
  },[lttEffPrice,lttFTHB,lttToronto]);

  // Closing uses price and down from Inputs (or overrides)
  const ccEffPrice=ccPriceOverride>0?ccPriceOverride:price;
  const ccEffDown=ccDownOverride>0?ccDownOverride:down;
  const closing=useMemo(()=>{
    if(ccEffPrice<=0)return null;
    const effDown=ccEffDown>0?ccEffDown:calcMinDown(ccEffPrice);
    const ontario=calcOntarioLTT(ccEffPrice,ccFTHB);
    const toronto=ccToronto?calcTorontoLTT(ccEffPrice,ccFTHB):{net:0};
    const lttTotal=ontario.net+toronto.net;
    const targetTotal=ccEffPrice*0.015;
    const total=lttTotal+ccLegal+ccInspect+ccTitle+ccOther;
    const pct=ccEffPrice>0?total/ccEffPrice*100:0;
    return{effDown,lttTotal,legal:ccLegal,inspect:ccInspect,title:ccTitle,other:ccOther,total,targetTotal,pct};
  },[ccEffPrice,ccEffDown,ccLegal,ccInspect,ccTitle,ccOther,ccFTHB,ccToronto]);

  // Amort uses price/down/rate/amort from Inputs
  const atEffPrice=atPriceOverride>0?atPriceOverride:price;
  const atEffDown=atDownOverride>0?atDownOverride:down;
  const atEffRate=atRateOverride>0?atRateOverride:rate;
  const atEffAmort=atAmortOverride>0?atAmortOverride:amort;
  const amortTable=useMemo(()=>{
    if(atEffPrice<=0)return{};
    const dn=atEffDown>0?atEffDown:calcMinDown(atEffPrice);
    const cmhc=getCMHCRate((dn/atEffPrice)*100,is30);
    const principal=Math.max(0,atEffPrice-dn)*(1+cmhc);
    if(principal<=0)return{};
    const rm=effRate(atEffRate,atComp);
    const n=atEffAmort*12;
    const pmt=(principal*rm*Math.pow(1+rm,n))/(Math.pow(1+rm,n)-1);
    let bal=principal;
    const rows=[];
    for(let yr=1;yr<=atEffAmort;yr++){
      let intYr=0,prinYr=0;
      for(let m=0;m<12;m++){const intM=bal*rm;const prinM=pmt-intM;intYr+=intM;prinYr+=prinM;bal=Math.max(0,bal-prinM);}
      rows.push({yr,payment:pmt*12,interest:intYr,principal:prinYr,balance:bal});
      if(bal<=0)break;
    }
    return{rows,pmt,principal};
  },[atEffPrice,atEffDown,atEffRate,atEffAmort,atComp,is30]);

  // RvB uses price/down/rate from Inputs
  const rvbEffPrice=rvbPriceOverride>0?rvbPriceOverride:price;
  const rvbEffDown=rvbDownOverride>0?rvbDownOverride:down;
  const rvb=useMemo(()=>{
    if(rvbEffPrice<=0||rvbRent<=0)return null;
    const yrs=rvbYears;
    const dn=rvbEffDown>0?rvbEffDown:calcMinDown(rvbEffPrice);
    const cmhc=getCMHCRate((dn/rvbEffPrice)*100,false);
    const mtg=Math.max(0,rvbEffPrice-dn)*(1+cmhc);
    const pmt=mtgPmt(mtg,rate,amort,"semi-annual");
    const propTaxAnnual=rvbEffPrice*0.01;
    const maintAnnual=rvbEffPrice*0.01;
    const totalBuyCost=pmt*12*yrs+propTaxAnnual*yrs+maintAnnual*yrs;
    const futureValue=rvbEffPrice*Math.pow(1+rvbAppreciation/100,yrs);
    let totalRentCost=0,rent=rvbRent;
    for(let i=0;i<yrs;i++){totalRentCost+=rent*12;rent*=(1+rvbRentIncrease/100);}
    const rm=effRate(rate,"semi-annual");
    let bal=mtg;
    for(let i=0;i<yrs*12;i++){bal=bal*(1+rm)-pmt;}
    bal=Math.max(0,bal);
    const equity=futureValue-bal;
    const netBuyCost=totalBuyCost-(equity-dn);
    return{pmt,totalBuyCost,totalRentCost,futureValue,equity,netBuyCost,buyWins:netBuyCost<totalRentCost,dn};
  },[rvbEffPrice,rvbEffDown,rate,amort,rvbRent,rvbAppreciation,rvbRentIncrease,rvbYears]);

  const refi=useMemo(()=>{
    if(rfBalance<=0||rfCurrentRate<=0||rfNewRate<=0)return null;
    const oldPmt=mtgPmt(rfBalance,rfCurrentRate,rfAmort,rfComp);
    const newPmt=mtgPmt(rfBalance,rfNewRate,rfAmort,rfComp);
    const monthlySavings=oldPmt-newPmt;
    const breakEvenMonths=rfPenalty>0&&monthlySavings>0?Math.ceil(rfPenalty/monthlySavings):0;
    return{oldPmt,newPmt,monthlySavings,annualSavings:monthlySavings*12,breakEvenMonths,lifetimeSavings:monthlySavings*rfAmort*12,saves:monthlySavings>0};
  },[rfBalance,rfCurrentRate,rfNewRate,rfAmort,rfPenalty,rfComp]);

  const renewal=useMemo(()=>{
    if(rnBalance<=0||rnCurrentRate<=0||rnNewRate<=0)return null;
    const oldPmt=mtgPmt(rnBalance,rnCurrentRate,rnAmort,rnComp);
    const newPmt=mtgPmt(rnBalance,rnNewRate,rnAmort,rnComp);
    const diff=newPmt-oldPmt;
    let daysUntil=null;
    if(rnRenewalDate){const today=new Date();const rd=new Date(rnRenewalDate);daysUntil=Math.round((rd-today)/(1000*60*60*24));}
    const urgency=daysUntil!==null?(daysUntil<=30?"red":daysUntil<=90?"amber":"green"):null;
    return{oldPmt,newPmt,diff,daysUntil,urgency,higher:diff>0};
  },[rnBalance,rnCurrentRate,rnNewRate,rnAmort,rnRenewalDate,rnComp]);

  // Prepayment calc
  const prepay=useMemo(()=>{
    if(ppBalance<=0||ppRate<=0||ppAmort<=0)return null;
    const rm=effRate(ppRate,ppComp);
    const n=ppAmort*12;
    const regPmt=(ppBalance*rm*Math.pow(1+rm,n))/(Math.pow(1+rm,n)-1);
    const balAfterLump=Math.max(0,ppBalance-ppLumpSum);
    const pmtWithExtra=regPmt+ppExtraMo;
    // termMonths: how long extra payments apply (0 = full amort)
    const termMonths=ppTermYrs>0?ppTermYrs*12:n;

    // --- Baseline: regular payments, no extras ---
    const interestRegular=regPmt*n-ppBalance;

    // --- Scenario: lump sum + extra for termMonths, then regular for remainder ---
    let bal=balAfterLump;
    let intWithChanges=0;
    let months=0;
    // Phase 1: extra payments during term
    for(let i=0;i<termMonths&&bal>0;i++){
      const interest=bal*rm;
      intWithChanges+=interest;
      bal=Math.max(0,bal-(pmtWithExtra-interest));
      months++;
    }
    // Phase 2: back to regular payments after term
    let balAtTermEnd=bal;
    let paidOffDuringTerm=bal<=0;
    if(!paidOffDuringTerm&&bal>0){
      // How many more months at regular rate?
      while(bal>0&&months<n*2){
        const interest=bal*rm;
        const principal=regPmt-interest;
        if(principal<=0)break;
        intWithChanges+=interest;
        bal=Math.max(0,bal-principal);
        months++;
      }
    }

    const yearsOff=ppAmort-months/12;
    const interestSaved=interestRegular-intWithChanges;
    // Balance at end of term (useful for renewal)
    const balEndOfTerm=ppTermYrs>0?balAtTermEnd:0;

    return{
      regPmt,balAfterLump,months,payoffYears:months/12,
      yearsOff:Math.max(0,yearsOff),
      interestSaved:Math.max(0,interestSaved),
      pmtWithExtra,balEndOfTerm,
      termMonths,paidOffDuringTerm
    };
  },[ppBalance,ppRate,ppAmort,ppComp,ppLumpSum,ppExtraMo,ppTermYrs]);

        doc.text(l2,rx+3,y+5);
        doc.setFontSize(11);doc.setFont("helvetica","bold");doc.setTextColor(...(c2||navy));
        doc.text(String(v2),rx+3,y+12);

      doc.setFillColor(...statusColor);
      doc.roundedRect(M,y,CW,12,2,2,"F");
      doc.setFontSize(11);doc.setFont("helvetica","bold");
      doc.setTextColor(255,255,255);

      y+=18;

      // 
      // KEY NUMBERS (2x2 grid)
      // 
      twoCol("MAX PURCHASE PRICE",c.maxPrice>0?fCAD(c.maxPrice):c.price>0?fCAD(c.price):"","MONTHLY PAYMENT",fCAD(c.pmts.monthly,2),blue,navy);
      twoCol("GDS RATIO",c.gds.toFixed(1)+"% (max "+gdsMax+"%)", "TDS RATIO",c.tds.toFixed(1)+"% (max "+tdsMax+"%)",c.gdsPass?green:red,c.tdsPass?green:red);
      y+=2;

      // 
      // INCOME & QUALIFICATION
      // 
      addSection("Income & Qualification");

      if(rental>0)addRow("Rental Income (50% add-back)",fCAD(rental*0.5,0)+"/mo");
      addRow("Qualifying Income",fCAD(c.qualMo*12,0)+"/yr ("+fCAD(c.qualMo,0)+"/mo)");
      addRow("Income Required to Qualify",fCAD(c.incNeeded,0)+"/yr",c.incNeeded<=(income+coIncome)?green:red);

      addRow("Total Mortgage",fCAD(c.totalMtg,0),blue);

  const AmortPane=(()=>{
    const atEffTerm=atTermOverride>0?atTermOverride:term;
    // atEffRate and atEffAmort are derived outside (memo level)

    // Frequency multiplier helpers
    const AT_FREQS=[
      {key:"monthly",label:"Monthly",perYear:12},
      {key:"semiMonthly",label:"Semi-Mo",perYear:24},
      {key:"biweekly",label:"Bi-Weekly",perYear:26},
      {key:"accelBiweekly",label:"Accel BW",perYear:26},
      {key:"weekly",label:"Weekly",perYear:52},
      {key:"accelWeekly",label:"Accel Wk",perYear:52},
    ];
    const freqInfo=AT_FREQS.find(f=>f.key===atFreq)||AT_FREQS[0];

    // Calculate per-period payment
    const rm=amortTable.pmt>0?effRate(atEffRate,atComp):0;
    const principal=amortTable.principal||0;
    const moPmt=amortTable.pmt||0;
    let freqPmt=0;
    if(atFreq==="monthly") freqPmt=moPmt;
    else if(atFreq==="semiMonthly") freqPmt=moPmt/2;
    else if(atFreq==="biweekly") freqPmt=moPmt*12/26;
    else if(atFreq==="accelBiweekly") freqPmt=moPmt/2;
    else if(atFreq==="weekly") freqPmt=moPmt*12/52;
    else if(atFreq==="accelWeekly") freqPmt=moPmt/4;

    // Full amort totals (monthly basis for accuracy)
    const totalPaid=moPmt*atEffAmort*12;
    const totalInt=totalPaid-principal;

    // Term summary from annual rows
    let termTotalPaid=0,termInt=0,termPrin=0,termBalAtRenewal=0;
    if(amortTable.rows&&amortTable.rows.length>0){
      const termRows=amortTable.rows.filter(r=>r.yr<=atEffTerm);
      termTotalPaid=termRows.reduce((s,r)=>s+r.payment,0);
      termInt=termRows.reduce((s,r)=>s+r.interest,0);
      termPrin=termRows.reduce((s,r)=>s+r.principal,0);
      termBalAtRenewal=termRows.length>0?termRows[termRows.length-1].balance:0;
    }

    // Build per-payment detail rows for term only
    const detailRows=[];
    if(atView==="detail"&&principal>0&&freqPmt>0){
      const rp=effRate(rate,atComp); // monthly effective rate
      // Convert to per-period rate
      const annualEff=Math.pow(1+rp,12)-1;
      let periodRate;
      if(atFreq==="monthly") periodRate=rp;
      else if(atFreq==="semiMonthly") periodRate=Math.pow(1+annualEff,1/24)-1;
      else if(atFreq==="biweekly"||atFreq==="accelBiweekly") periodRate=Math.pow(1+annualEff,1/26)-1;
      else if(atFreq==="weekly"||atFreq==="accelWeekly") periodRate=Math.pow(1+annualEff,1/52)-1;
      else periodRate=rp;

      const termPeriods=atEffTerm*freqInfo.perYear;
      let bal=principal;
      for(let p=1;p<=termPeriods&&bal>0.01;p++){
        const intPart=bal*periodRate;
        const prinPart=Math.min(freqPmt-intPart,bal);
        bal=Math.max(0,bal-prinPart);
        detailRows.push({p,intPart,prinPart,balance:bal,pmt:freqPmt});
      }
    }

    return(
    <div style={{paddingBottom:16}}>
      <SectionTitle>Amortization Table</SectionTitle>

      {/* Price + Down inputs */}
      <Field label="Purchase Price" hint={atPriceOverride===0&&price>0?"From Inputs tab":atPriceOverride>0?"Override active":""}>
        <NumInput value={atPriceOverride>0?atPriceOverride:(price||0)} onChange={v=>{if(v>0)setAtPriceOverride(v);else setAtPriceOverride(0);}} pre="$"/>
      </Field>
      <Field label="Down Payment" hint={atDownOverride===0&&atEffPrice>0?"Min: "+fCAD(Math.ceil(calcMinDown(atEffPrice)),0):""}>
        <NumInput value={atDownOverride>0?atDownOverride:(atEffPrice>0?Math.ceil(calcMinDown(atEffPrice)):0)} onChange={v=>setAtDownOverride(v)} pre="$"/>
        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
          {[{label:"Min",fn:()=>setAtDownOverride(Math.ceil(calcMinDown(atEffPrice)))},{label:"10%",fn:()=>setAtDownOverride(Math.round(atEffPrice*0.10))},{label:"15%",fn:()=>setAtDownOverride(Math.round(atEffPrice*0.15))},{label:"20%",fn:()=>setAtDownOverride(Math.round(atEffPrice*0.20))}].map(opt=>(
            <button key={opt.label} onClick={opt.fn} disabled={atEffPrice<=0}
              style={{flex:1,height:36,borderRadius:9,border:"1px solid "+C.border,background:"rgba(118,118,128,0.09)",color:atEffPrice>0?C.text:C.label,fontSize:13,fontWeight:500,cursor:atEffPrice>0?"pointer":"default",fontFamily:C.font}}>
              {opt.label}

        </div>

      {atEffPrice<=0&&<InfoBox color="blue">Enter a purchase price above or set one in the Inputs tab.</InfoBox>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:16}}>
        <Field label="Interest Rate" hint={atRateOverride===0?"From Inputs ("+rate+"%)":""}>
          <div style={{display:"flex",alignItems:"center",height:46,background:atRateOverride>0?"rgba(255,149,0,0.08)":"rgba(118,118,128,0.1)",border:"1.5px solid "+(atRateOverride>0?"rgba(255,149,0,0.4)":"rgba(0,0,0,0.09)"),borderRadius:12,overflow:"hidden",transition:"all 0.18s"}}>
            <span style={{padding:"0 14px",fontSize:15,color:atRateOverride>0?C.amber:C.label,fontWeight:500}}>%</span>
            <input type="number" step="0.01" min="0.5" max="15"
              value={atRateOverride>0?atRateOverride:rate}
              onChange={e=>{const v=parseFloat(e.target.value);setAtRateOverride(v!==rate?v:0);}}
              style={{flex:1,border:"none",outline:"none",background:"transparent",fontSize:17,color:atRateOverride>0?C.amber:C.text,fontFamily:C.font,fontWeight:atRateOverride>0?700:400,padding:"0 12px"}}/>
          </div>
          {atRateOverride>0&&(
            <button onClick={()=>setAtRateOverride(0)}
              style={{marginTop:4,fontSize:12,color:C.blue,background:"rgba(0,113,227,0.08)",border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontFamily:C.font}}>
              Reset to {rate}%
            </button>
          )}
        </Field>
        <Field label="Amortization" hint={atAmortOverride===0?"From Inputs ("+amort+"yr)":""}>
          <select value={atEffAmort} onChange={e=>{const v=parseInt(e.target.value);setAtAmortOverride(v!==amort?v:0);}}
            style={{width:"100%",height:46,borderRadius:12,border:"1.5px solid "+(atAmortOverride>0?"rgba(0,113,227,0.4)":"rgba(0,0,0,0.09)"),background:atAmortOverride>0?"rgba(0,113,227,0.06)":"rgba(118,118,128,0.1)",fontSize:15,fontWeight:600,color:atAmortOverride>0?C.blue:C.text,textAlign:"center",cursor:"pointer",fontFamily:C.font,WebkitAppearance:"auto",transition:"all 0.18s"}}>
            {[5,10,15,20,25,30].map(a=>(
              <option key={a} value={a}>{a} years{a===amort?" (from Inputs)":""}</option>
            ))}
          </select>
          {atAmortOverride>0&&(
            <button onClick={()=>setAtAmortOverride(0)}
              style={{marginTop:4,fontSize:12,color:C.blue,background:"rgba(0,113,227,0.08)",border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontFamily:C.font}}>
              Reset to {amort}yr
            </button>
          )}
        </Field>
      </div>

      <Divider/>

      {/* Controls grid */}
      <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:10,marginBottom:4}}>
        <Field label="Compounding">
          <Pills value={atComp} onChange={setAtComp} options={COMPOUNDS.map(x=>({key:x.key,label:x.label}))}/>
        </Field>
        <Field label="Payment Frequency">
          <Pills value={atFreq} onChange={setAtFreq} options={AT_FREQS.map(x=>({key:x.key,label:x.label}))}/>
        </Field>
      </div>
      <Field label="Term" hint={atTermOverride===0?"From Inputs":""}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select value={atEffTerm} onChange={e=>setAtTermOverride(parseInt(e.target.value))}
            style={{flex:1,height:46,borderRadius:12,border:"1.5px solid rgba(52,199,89,0.4)",background:"rgba(52,199,89,0.06)",fontSize:15,fontWeight:600,color:C.green,textAlign:"center",cursor:"pointer",fontFamily:C.font,WebkitAppearance:"auto"}}>
            {[1,2,3,4,5,7,10].map(t=>(
              <option key={t} value={t}>{t}-Year Term{t===term?" (from Inputs)":""}</option>
            ))}
          </select>
          {atTermOverride>0&&(
            <button onClick={()=>setAtTermOverride(0)}
              style={{fontSize:12,color:C.blue,background:"rgba(0,113,227,0.08)",border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontFamily:C.font,whiteSpace:"nowrap"}}>
              Reset to {term}yr
            </button>
          )}
        </div>
      </Field>

      {amortTable.rows&&amortTable.rows.length>0&&(
        <>
          <Divider/>

          {/* Summary stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:16}}>
            {[
              {label:freqInfo.label+" Payment", val:fCAD(freqPmt,2), color:C.blue, sub:atEffRate+"%  "+atEffAmort+"yr amort"},
              {label:"Total Interest", val:fCAD(totalInt,0), color:C.red, sub:"over full amortization"},
              {label:"Total Cost", val:fCAD(totalPaid,0), color:C.text, sub:"principal + interest"},
              {label:"Interest % of Price", val:(atEffPrice>0?(totalInt/atEffPrice*100).toFixed(0):0)+"%", color:C.amber, sub:atEffPrice>0?fCAD(atEffPrice,0):""},
            ].map(s=>(
              <div key={s.label} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,padding:"14px 16px",boxShadow:C.shadow}}>
                <div style={{fontSize:11,fontWeight:600,color:C.label,textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:6}}>{s.label}</div>
                <div style={{fontSize:mobile?22:26,fontWeight:700,color:s.color,letterSpacing:"-0.04em",lineHeight:1,marginBottom:4}}>{s.val}</div>
                <div style={{fontSize:11,color:C.label,opacity:0.7}}>{s.sub}</div>
              </div>
            ))}
          </div>

          {/* Term summary dark card */}
          {atEffTerm>0&&termTotalPaid>0&&(
            <div style={{background:"linear-gradient(160deg,#1c1c1e,#2a2a2e)",borderRadius:16,padding:"18px 20px",marginBottom:20,boxShadow:"0 8px 32px rgba(0,0,0,0.15),inset 0 1px 0 rgba(255,255,255,0.05)"}}>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",fontWeight:500,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:14}}>
                {atEffTerm}-Year Term Summary
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:12}}>
                <div style={{background:"rgba(255,255,255,0.07)",borderRadius:11,padding:"12px 14px"}}>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginBottom:3}}>Total Paid</div>
                  <div style={{fontSize:18,fontWeight:700,color:"#fff",letterSpacing:"-0.03em"}}>{fCAD(termTotalPaid,0)}</div>
                </div>
                <div style={{background:"rgba(255,59,48,0.15)",borderRadius:11,padding:"12px 14px"}}>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginBottom:3}}>Interest Paid</div>
                  <div style={{fontSize:18,fontWeight:700,color:C.red,letterSpacing:"-0.03em"}}>{fCAD(termInt,0)}</div>
                </div>
                <div style={{background:"rgba(52,199,89,0.12)",borderRadius:11,padding:"12px 14px"}}>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginBottom:3}}>Principal Paid</div>
                  <div style={{fontSize:18,fontWeight:700,color:C.green,letterSpacing:"-0.03em"}}>{fCAD(termPrin,0)}</div>
                </div>
                <div style={{background:"rgba(255,149,0,0.15)",borderRadius:11,padding:"12px 14px"}}>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginBottom:3}}>Balance at Renewal</div>
                  <div style={{fontSize:18,fontWeight:700,color:C.amber,letterSpacing:"-0.03em"}}>{fCAD(termBalAtRenewal,0)}</div>
                </div>
              </div>
              <div style={{height:6,borderRadius:3,overflow:"hidden",display:"flex",gap:1}}>
                <div style={{width:(termPrin/termTotalPaid*100)+"%",background:C.green,transition:"width 0.8s ease"}}/>
                <div style={{flex:1,background:"rgba(255,59,48,0.6)"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>{(termPrin/termTotalPaid*100).toFixed(1)}% principal</span>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>{(termInt/termTotalPaid*100).toFixed(1)}% interest</span>
              </div>
            </div>
          )}

          {/* View toggle */}
          <div style={{marginBottom:16}}>
            <Pills value={atView} onChange={setAtView} options={[
              {key:"annual",label:"Annual (full amort)"},
              {key:"detail",label:freqInfo.label+" detail (term only)"},
            ]}/>
          </div>

          {/* Annual table */}
          {atView==="annual"&&(
            <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",borderRadius:12,border:"1px solid "+C.border}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,fontFamily:C.font}}>
                <thead>
                  <tr style={{background:"rgba(118,118,128,0.06)"}}>
                    {["Year","Annual Pmt","Interest","Principal","Balance"].map(h=>(
                      <th key={h} style={{padding:"10px 12px",textAlign:"right",color:C.label,fontWeight:600,fontSize:12,borderBottom:"1px solid "+C.border}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {amortTable.rows.map((r,i)=>{
                    const inTerm=r.yr<=atEffTerm;
                    const isTermEnd=r.yr===atEffTerm;
                    return (
                      <>
                        <tr key={r.yr} style={{background:inTerm?"rgba(52,199,89,0.05)":i%2===0?"transparent":"rgba(118,118,128,0.04)",borderLeft:inTerm?"3px solid rgba(52,199,89,0.35)":"3px solid transparent"}}>
                          <td style={{padding:"9px 12px",textAlign:"right",fontWeight:600,color:inTerm?C.green:C.blue}}>Yr {r.yr}</td>
                          <td style={{padding:"9px 12px",textAlign:"right"}}>{fCAD(r.payment,0)}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",color:C.red}}>{fCAD(r.interest,0)}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",color:C.green}}>{fCAD(r.principal,0)}</td>
                          <td style={{padding:"9px 12px",textAlign:"right",fontWeight:inTerm?600:500,color:inTerm?C.amber:C.text}}>{fCAD(r.balance,0)}</td>
                        </tr>
                        {isTermEnd&&(
                          <tr key="term-marker" style={{background:"rgba(255,149,0,0.08)"}}>
                            <td colSpan={5} style={{padding:"6px 12px",textAlign:"center",fontSize:11,fontWeight:700,color:C.amber,letterSpacing:"0.06em",textTransform:"uppercase",borderTop:"2px dashed rgba(255,149,0,0.4)",borderBottom:"2px dashed rgba(255,149,0,0.4)"}}>
                              End of {atEffTerm}-Year Term  Balance at Renewal: {fCAD(r.balance,0)}
                            </td>
                          </tr>
                        )}
                      </>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* Detail table  term payments only */}
          {atView==="detail"&&(
            <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",borderRadius:12,border:"1px solid "+C.border}}>
              {detailRows.length===0?(
                <div style={{padding:"20px",textAlign:"center",color:C.label,fontSize:13}}>Calculating...</div>
              ):(
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,fontFamily:C.font}}>
                  <thead>
                    <tr style={{background:"rgba(118,118,128,0.06)"}}>
                      {["#","Payment","Interest","Principal","Balance"].map(h=>(
                        <th key={h} style={{padding:"9px 12px",textAlign:"right",color:C.label,fontWeight:600,fontSize:11,borderBottom:"1px solid "+C.border}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {detailRows.map((r,i)=>(
                      <tr key={r.p} style={{background:i%2===0?"transparent":"rgba(118,118,128,0.03)"}}>
                        <td style={{padding:"7px 12px",textAlign:"right",color:C.label,fontSize:11}}>#{r.p}</td>
                        <td style={{padding:"7px 12px",textAlign:"right",fontWeight:500}}>{fCAD(r.pmt,2)}</td>
                        <td style={{padding:"7px 12px",textAlign:"right",color:C.red}}>{fCAD(r.intPart,2)}</td>
                        <td style={{padding:"7px 12px",textAlign:"right",color:C.green}}>{fCAD(r.prinPart,2)}</td>
                        <td style={{padding:"7px 12px",textAlign:"right",fontWeight:500}}>{fCAD(r.balance,0)}</td>
                      </tr>

                      </td>
                    </tr>
                  </tfoot>
                </table>
              )}
            </div>
          )}
        </>
      )}
    </div>
    );

    <div style={{paddingBottom:16}}>
      <SectionTitle>Prepayment Calculator</SectionTitle>
      <p style={{fontSize:14,color:C.label,marginBottom:20,lineHeight:1.6}}>See how lump sum payments or extra monthly contributions reduce your amortization and total interest.</p>
      <Field label="Current Balance"><NumInput value={ppBalance} onChange={setPpBalance} pre="$"/></Field>

  const MP_FREQS=[{key:"monthly",label:"Monthly"},{key:"biweekly",label:"Bi-Weekly"},{key:"weekly",label:"Weekly"}];
  const[mpPriceOverride,setMpPriceOverride]=useState(0);

  const[mpNumCols,setMpNumCols]=useState(2); // 2 default, up to 4

  const[mpCols,setMpCols]=useState([
    {downPct:5, downAmt$:0, downMode:"%", amort:30, rate:4.5,  term:5, label:"Scenario A"},
    {downPct:20,downAmt$:0, downMode:"%", amort:25, rate:4.75, term:5, label:"Scenario B"},
    {downPct:10,downAmt$:0, downMode:"%", amort:25, rate:5.0,  term:3, label:"Scenario C"},
    {downPct:15,downAmt$:0, downMode:"%", amort:25, rate:5.25, term:5, label:"Scenario D"},
  ]);
  function setMpCol(i,field,val){setMpCols(prev=>prev.map((c,idx)=>idx===i?{...c,[field]:val}:c));}

  const mpEffPrice=mpPriceOverride>0?mpPriceOverride:price;
  const activeCols=mpCols.slice(0,mpNumCols);

  const mpCalc=useMemo(()=>{
    if(mpEffPrice<=0)return[];
    return activeCols.map(col=>{
      const isMinDown=col.downPct<=5&&col.downMode=="%";
      const downAmt=col.downMode==="$"&&col["downAmt$"]>0
        ?col["downAmt$"]
        :isMinDown?Math.ceil(calcMinDown(mpEffPrice)):Math.round(mpEffPrice*col.downPct/100);
      const downPctActual=mpEffPrice>0?(downAmt/mpEffPrice)*100:col.downPct;
      const cmhcRate=getCMHCRate(downPctActual,col.amort>25);
      const base=Math.max(0,mpEffPrice-downAmt);
      const cmhcAmt=base*cmhcRate;
      const totalMtg=base+cmhcAmt;
      const colRate=col.rate||4.5;
      const rm=effRate(colRate,mpComp);
      const n=col.amort*12;
      const moPayment=totalMtg>0&&rm>0?(totalMtg*rm*Math.pow(1+rm,n))/(Math.pow(1+rm,n)-1):0;
      const freqPmt=mpFreq==="monthly"?moPayment:mpFreq==="biweekly"?moPayment*12/26:moPayment*12/52;
      const freqPerYear=mpFreq==="monthly"?12:mpFreq==="biweekly"?26:52;
      // Term breakdown
      const termMonths=col.term*12;
      let bal=totalMtg, termInt=0, termPrin=0;
      for(let i=0;i<termMonths&&bal>0.01;i++){
        const intM=bal*rm;
        const prinM=Math.min(moPayment-intM,bal);
        termInt+=intM; termPrin+=prinM; bal=Math.max(0,bal-prinM);
      }
      const balAtRenewal=Math.max(0,bal);
      const termTotalPaid=moPayment*termMonths;
      // Full amort totals
      const totalPaid=moPayment*n;
      const totalInt=totalPaid-totalMtg;
      // LTT + closing
      const ontario=calcOntarioLTT(mpEffPrice,mpFTHB);
      const toronto=mpLocation==="Toronto"?calcTorontoLTT(mpEffPrice,mpFTHB):{tax:0,rebate:0,net:0};
      const lttTotal=ontario.net+toronto.net;
      const cashToClose=downAmt+lttTotal+mpEffPrice*0.015;
      const propTaxMo=mpEffPrice*0.01/12;
      const heatMo=100;
      const monthlyExp=moPayment+propTaxMo+heatMo;
      return{
        downAmt,downPctActual,cmhcRate,cmhcAmt,totalMtg,
        moPayment,freqPmt,
        termInt,termPrin,termTotalPaid,balAtRenewal,
        totalPaid,totalInt,
        lttTotal,cashToClose,propTaxMo,heatMo,monthlyExp,
        rate:colRate,amort:col.amort,term:col.term,
      };
    });
  },[mpEffPrice,activeCols,mpComp,mpFTHB,mpFreq,mpLocation,mpNumCols]);
