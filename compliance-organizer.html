<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Compliance Organizer | Neel Idnani Mortgage Group</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0f1e35;--navy-mid:#1a3050;--navy-light:#234470;--gold:#c9a84c;--gold-light:#e8c97a;--cream:#f8f5ef;--cream-dark:#ede8de;--text:#1a1a2e;--text-mid:#4a5568;--text-light:#718096;--white:#fff;--success:#2d6a4f;--warning:#b7791f;--error:#c62828;--radius:10px;--shadow:0 4px 24px rgba(15,30,53,.10)}
html{-webkit-text-size-adjust:100%}
body{font-family:"DM Sans",sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.tnav{background:#080f1c;border-bottom:1px solid rgba(201,168,76,.15);display:flex;align-items:center;padding:0 1.5rem;height:36px;position:sticky;top:0;z-index:200;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tnav::-webkit-scrollbar{display:none}
.tnav span{font-size:.62rem;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;margin-right:1rem;white-space:nowrap;flex-shrink:0}
.tnav a{padding:0 .9rem;height:36px;display:flex;align-items:center;font-size:.75rem;color:rgba(255,255,255,.5);text-decoration:none;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tnav a.act{color:var(--gold-light);border-bottom-color:var(--gold);font-weight:500}
.hdr{background:var(--navy);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:36px;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.25)}
.hbrand{display:flex;align-items:center;gap:10px}
.hlogo{width:32px;height:32px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--navy);font-weight:bold;font-family:"DM Serif Display",serif;flex-shrink:0}
.htit{font-family:"DM Serif Display",serif;font-size:1.05rem;color:var(--white);white-space:nowrap}
.hsub{font-size:.65rem;color:var(--gold-light);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.hbdg{background:var(--navy-light);border:1px solid var(--gold);border-radius:20px;padding:4px 12px;font-size:.68rem;color:var(--gold-light);text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 96px)}
.sbar{background:var(--navy-mid);padding:2rem 0;position:sticky;top:96px;height:calc(100vh - 96px);overflow-y:auto}
.slbl{font-size:.62rem;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;padding:0 1.5rem;margin-bottom:.75rem;margin-top:1.5rem}
.sbtn{display:flex;align-items:center;gap:12px;width:100%;padding:.7rem 1.5rem;background:transparent;border:none;cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent}
.sbtn:hover{background:rgba(201,168,76,.08)}
.sbtn.act{background:rgba(201,168,76,.15);border-left:3px solid var(--gold)}
.sbtn.act .snum{background:var(--gold);color:var(--navy)}
.sbtn.dn .snum{background:var(--success);color:#fff}
.snum{width:24px;height:24px;border-radius:50%;background:var(--navy-light);color:var(--cream);font-size:.7rem;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stxt{font-size:.8rem;color:var(--cream)}
.sbtn.act .stxt{color:var(--gold-light);font-weight:500}
.prog-wrap{padding:1.5rem}
.pw{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-bottom:.5rem}
.pf{height:100%;background:var(--gold);border-radius:2px;transition:width .4s}
.main{padding:2.5rem 3rem;max-width:900px;width:100%}
.sech{margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--cream-dark)}
.sect{font-family:"DM Serif Display",serif;font-size:1.6rem;color:var(--navy);margin-bottom:.3rem}
.secd{font-size:.85rem;color:var(--text-mid)}
.card{background:var(--white);border-radius:var(--radius);padding:1.75rem;margin-bottom:1.25rem;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.05)}
.ctit{font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:1.25rem;display:flex;align-items:center;gap:8px}
.ctit::after{content:"";flex:1;height:1px;background:var(--cream-dark)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.fld{display:flex;flex-direction:column;gap:6px}
.fld.full{grid-column:1/-1}
label{font-size:.75rem;font-weight:500;color:var(--text-mid)}
input,select,textarea{font-family:"DM Sans",sans-serif;font-size:16px;padding:.65rem .875rem;border:1.5px solid var(--cream-dark);border-radius:7px;background:var(--cream);color:var(--text);width:100%;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);background:var(--white)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.rg{display:flex;gap:.6rem;flex-wrap:wrap}
.ri{padding:.5rem .9rem;border-radius:6px;border:1.5px solid var(--cream-dark);cursor:pointer;background:var(--cream);font-size:.82rem;user-select:none;min-height:44px;display:flex;align-items:center}
.ri:hover{border-color:var(--gold)}
.ri.sel{border-color:var(--gold);background:rgba(201,168,76,.1);font-weight:500}
.brow{display:flex;gap:.75rem;margin-top:2rem;flex-wrap:wrap}
.bp{background:var(--navy);color:var(--white);border:none;border-radius:8px;padding:.75rem 1.75rem;font-size:.875rem;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;min-height:48px;-webkit-tap-highlight-color:transparent}
.bp:hover{background:var(--navy-light)}
.bp:disabled{opacity:.6;cursor:not-allowed}
.bs{background:transparent;color:var(--text-mid);border:1.5px solid var(--cream-dark);border-radius:8px;padding:.75rem 1.5rem;font-size:.875rem;cursor:pointer;font-family:"DM Sans",sans-serif;min-height:48px}
.bs:hover{border-color:var(--navy);color:var(--navy)}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.doc-sec{margin-bottom:1.5rem}
.doc-sec-title{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);padding:.5rem .75rem;background:var(--cream-dark);border-radius:6px;margin-bottom:.75rem}
.doc-row{display:flex;align-items:center;gap:10px;padding:.75rem;border-radius:8px;border:1.5px solid var(--cream-dark);margin-bottom:.5rem;background:var(--white);flex-wrap:wrap}
.doc-row.upl{border-color:var(--success);background:#f0faf4}
.doc-row.opt{border-style:dashed}
.doc-num{width:22px;height:22px;border-radius:50%;background:var(--navy);color:var(--gold);font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-row.upl .doc-num{background:var(--success);color:#fff}
.doc-info{flex:1;min-width:120px}
.doc-name{font-size:.84rem;font-weight:500;color:var(--text);line-height:1.3}
.doc-sub{font-size:.71rem;color:var(--text-light);margin-top:2px}
.doc-tag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:4px;font-size:.63rem;font-weight:600;text-transform:uppercase;margin-left:5px;vertical-align:middle}
.tag-opt{background:rgba(183,121,31,.1);color:var(--warning)}
.tag-pur{background:rgba(15,30,53,.1);color:var(--navy)}
.doc-acts{display:flex;align-items:center;gap:6px;flex-shrink:0}
.upl-btn{padding:.4rem .85rem;border-radius:6px;border:1.5px solid var(--cream-dark);background:var(--cream);color:var(--text-mid);font-size:.75rem;cursor:pointer;font-family:"DM Sans",sans-serif;white-space:nowrap;min-height:36px}
.upl-btn:hover{border-color:var(--navy);color:var(--navy)}
.doc-row.upl .upl-btn{border-color:var(--success);color:var(--success);background:rgba(45,106,79,.05)}
.rm-btn{width:28px;height:28px;border-radius:50%;border:none;background:rgba(198,40,40,.1);color:var(--error);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hi{display:none}
.sum-box{background:linear-gradient(135deg,var(--navy),var(--navy-mid));border-radius:var(--radius);padding:1.5rem 2rem;color:var(--white);margin-bottom:1.5rem}
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1rem;flex-wrap:wrap}
.slb{font-size:.65rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.svl{font-size:.9rem;color:var(--white)}
.pring{display:flex;gap:1rem;margin-top:1.25rem;flex-wrap:wrap}
.pi{flex:1;min-width:70px;background:rgba(255,255,255,.05);border-radius:8px;padding:.75rem;text-align:center}
.pn{font-size:1.4rem;font-weight:700;color:var(--gold)}
.pl{font-size:.63rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em}
.genb{background:linear-gradient(135deg,var(--navy),var(--navy-light));color:var(--white);border:none;border-radius:10px;padding:1rem 2.5rem;font-size:1rem;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 8px 32px rgba(15,30,53,.25);min-height:52px;width:100%;max-width:360px}
.genb:hover{transform:translateY(-1px)}
.genb:disabled{opacity:.6;cursor:not-allowed;transform:none}
.ok{background:#d4edda;border:1px solid #c3e6cb;border-radius:8px;padding:1rem 1.25rem;color:var(--success);font-size:.85rem;display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.warn{background:#fef3cd;border:1px solid #f6d860;border-radius:8px;padding:.75rem 1rem;color:var(--warning);font-size:.82rem;margin-bottom:1rem;line-height:1.4}
.bulk-box{background:linear-gradient(135deg,#0f1e35,#1a3050);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem;border:1px solid rgba(201,168,76,.3)}
.footer{background:#111827;border-top:1px solid rgba(255,255,255,.08);padding:1.5rem 2.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1.25rem}
.f-left{display:flex;align-items:center;gap:1rem}
.f-av{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#8a6520);display:flex;align-items:center;justify-content:center;font-family:"DM Serif Display",serif;font-size:1.1rem;color:var(--white);font-weight:700;flex-shrink:0;border:2px solid rgba(201,168,76,.4)}
.f-name{font-size:.95rem;font-weight:700;color:var(--white);margin-bottom:2px}
.f-city{font-size:.78rem;color:rgba(255,255,255,.5);margin-bottom:6px}
.f-contact{display:flex;align-items:center;gap:1.25rem;flex-wrap:wrap}
.f-contact a,.f-contact span{font-size:.78rem;color:rgba(255,255,255,.6);text-decoration:none}
.f-contact a:hover{color:var(--gold-light)}
.f-right{text-align:right}
.f-agent{font-size:.82rem;font-weight:600;color:rgba(255,255,255,.85);margin-bottom:3px}
.f-lic{font-size:.72rem;color:rgba(255,255,255,.4);line-height:1.7}
.f-disc{background:#0d1117;border-top:1px solid rgba(255,255,255,.05);padding:.875rem 2.5rem;font-size:.68rem;color:rgba(255,255,255,.3);line-height:1.6}
.f-disc a{color:rgba(201,168,76,.5);text-decoration:none}
@media(max-width:900px){.layout{grid-template-columns:200px 1fr}.main{padding:2rem 1.75rem}.sum-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){
  .hdr{height:52px;top:36px;padding:0 1rem}.htit{font-size:.9rem}.hsub,.hbdg{display:none}
  .tnav{height:36px;padding:0 .5rem}.tnav span{display:none}.tnav a{padding:0 .65rem;font-size:.72rem}
  .layout{grid-template-columns:1fr;min-height:unset}
  .sbar{position:sticky;top:88px;z-index:90;height:auto;padding:0;display:flex;flex-direction:row;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid rgba(201,168,76,.2)}
  .sbar::-webkit-scrollbar{display:none}
  .slbl{display:none}
  .sbtn{flex-direction:column;align-items:center;padding:.5rem .65rem;min-width:72px;border-left:none;border-bottom:3px solid transparent;gap:3px;flex-shrink:0}
  .sbtn.act{border-left:none;border-bottom-color:var(--gold)}
  .snum{width:20px;height:20px;font-size:.6rem}.stxt{font-size:.6rem;text-align:center;white-space:nowrap}
  .prog-wrap{display:none}
  .main{padding:1.1rem .875rem}.sect{font-size:1.25rem}.card{padding:1.1rem;margin-bottom:1rem}
  .g2{grid-template-columns:1fr}.fld.full{grid-column:1}
  .sum-grid{grid-template-columns:1fr 1fr}
  .rg{gap:.4rem}
  .brow{gap:.5rem}.bp,.bs{width:100%;justify-content:center}
  .genb{max-width:100%}
  .footer{padding:1.25rem;gap:1rem}.f-right{text-align:left}.f-disc{padding:.75rem 1.25rem}
  .f-left{flex-direction:column;align-items:flex-start;gap:.75rem}
}
@media(max-height:500px) and (orientation:landscape){
  .hdr{height:44px;top:36px}.sbar{top:80px}
  .main{padding:.875rem}.card{padding:.875rem;margin-bottom:.75rem}
}
</style>
</head>

function b64ToBytes(b64){
  var bin=atob(b64);
  var bytes=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes;
}

function fmtD(iso){
  if(!iso) return "";
  var p=iso.split("-");
  return p.length===3 ? p[1]+"/"+p[2]+"/"+p[0] : iso;
}

function fmtAmt(v){
  var raw=v.replace(/[^0-9.]/g,"");
  if(raw && !isNaN(raw)) return "$"+Number(raw).toLocaleString("en-CA");
  return v;
}

function dlBytes(bytes,name){
  var blob=new Blob([bytes],{type:"application/pdf"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url; a.download=name; a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},2000);
}

async function mergePDFs(arr){
  var merged=await PDFLib.PDFDocument.create();
  for(var i=0;i<arr.length;i++){
    try{
      var doc=await PDFLib.PDFDocument.load(arr[i],{ignoreEncryption:true});
      var pages=await merged.copyPages(doc,doc.getPageIndices());
      pages.forEach(function(p){merged.addPage(p);});
    }catch(e){console.error("merge error",i,e);}
  }
  return await merged.save();
}

async function fillChecklist(d, uploadedIds){
  var pdf=await PDFLib.PDFDocument.load(b64ToBytes(window.CL_B64),{ignoreEncryption:true});
  var form=pdf.getForm();
  function tf(n,v){try{form.getTextField(n).setText(v||"");}catch(e){}}
  function cb(n,v){try{var f=form.getCheckBox(n);v?f.check():f.uncheck();}catch(e){}}
  tf("Agent Name","Neel Idnani");
  tf("Lender",d.lender||"");
  tf("FIle No",d.fileNo||"");
  tf("Close Date",fmtD(d.closingDate));
  tf("Client Names",(d.client1||"")+(d.client2?", "+d.client2:""));
  tf("Property Address",d.property||"");
  tf("Mortgage Amount",d.mortgageAmt||"");
  tf("Transaction Type",d.txType||"");
  tf("Co-Agent",d.coAgent||"");
  tf("Split",d.split||"");
  tf("Compliance Notes",d.notes||"");
  DOCS.forEach(function(doc){
    if(doc.cb) cb(doc.cb, uploadedIds.indexOf(doc.id)>=0);
  });
  try{
    var hel=await pdf.embedFont(PDFLib.StandardFonts.Helvetica);
    form.getFields().forEach(function(f){try{f.setFontSize(9);f.updateAppearances(hel);}catch(e){}});
  }catch(e){}
  form.flatten();
  return await pdf.save();
}

  });
  const [uploads,setUploads]=useState({});
  const fileRefs=useRef({});

  const sv=(k,v)=>setD(d=>({...d,[k]:v}));
  const isPurchase=D.txType==="Purchase";

  const visDocs=DOCS.filter(function(doc){
    if(doc.req==="purchase") return isPurchase;
    return true;
  });
  const reqDocs=visDocs.filter(function(d){return d.req==="required";});
  const uplIds=Object.keys(uploads);
  const uplReq=reqDocs.filter(function(d){return uplIds.indexOf(d.id)>=0;});
  const overallPct=Object.values({
    deal:!!(D.client1&&D.lender&&D.txType),
    docs:uplReq.length===reqDocs.length,
    review:uplReq.length===reqDocs.length,
    generate:done
  }).filter(Boolean).length/STEPS.length*100;

  function onFile(docId,e){
    var file=e.target.files[0];
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      setUploads(function(u){return Object.assign({},u,{[docId]:{name:file.name,bytes:new Uint8Array(ev.target.result)}});});
    };
    reader.readAsArrayBuffer(file);
  }

  function onBulk(e){
    var files=Array.from(e.target.files);
    files.forEach(function(file){
      var n=file.name.toLowerCase();
      var m="other";
      if(n.includes("kyc")||n.includes("know your client")) m="kyc";
      else if(n.includes("consent")) m="consent";
      else if(n.includes("suitability")||n.includes("suit")) m="suitability";
      else if(n.includes("disclosure")) m="disclosure";
      else if(n.includes("material")||n.includes("risk")) m="material";
      else if(n.includes("commit")) m="commitment";
      else if(n.includes("mpp")||n.includes("protection")) m="mpp";
      else if(n.includes("income")||n.includes("employment")||n.includes("t4")||n.includes("noa")) m="income";
      else if(n.includes("offer")||n.includes("purchase")||n.includes("otp")) m="purchase";
      else if(n.includes("down")||n.includes("dp")) m="downpayment";
      else if(n.includes("lod")||n.includes("direction")) m="lod";
      else if(n.includes("sanction")) m="fr_sanc";
      else if(n.includes("pep")) m="fr_pep";
      else if(n.includes("fintrac")) m="fr_risk";
      var reader=new FileReader();
      reader.onload=function(ev){
        setUploads(function(u){return Object.assign({},u,{[m]:{name:file.name,bytes:new Uint8Array(ev.target.result)}});});
      };
      reader.readAsArrayBuffer(file);
    });
    e.target.value="";
  }

  function rmFile(docId){
    setUploads(function(u){var n=Object.assign({},u);delete n[docId];return n;});
    if(fileRefs.current[docId]) fileRefs.current[docId].value="";
  }

  async function generate(){
    setGenerating(true);
    var n=(D.client1||"client").replace(/[^a-zA-Z0-9]/g,"_");
    var dt=(D.closingDate||"").replace(/[^0-9-]/g,"");
    try{
      var clBytes=await fillChecklist(D,uplIds);
      dlBytes(clBytes,"1_Checklist_"+n+".pdf");
      await new Promise(function(r){setTimeout(r,600);});
      var ordered=[clBytes];
      visDocs.forEach(function(doc){
        if(doc.id==="checklist") return;
        if(uploads[doc.id]) ordered.push(uploads[doc.id].bytes);
      });
      var merged=await mergePDFs(ordered);
      await new Promise(function(r){setTimeout(r,400);});
      dlBytes(merged,"Compliance_Package_"+n+"_"+dt+".pdf");
      setDone(true);
    }catch(e){
      console.error("Generate error:",e);
      alert("Error: "+e.message);
    }
    setGenerating(false);
  }

  var stdDocs=visDocs.filter(function(d){return d.sec==="std";});
  var finDocs=visDocs.filter(function(d){return d.sec==="fin";});

  function DocRow(props){
    var doc=props.doc;
    var upl=uploads[doc.id];
    var isOpt=doc.req==="optional";
    var isPur=doc.req==="purchase";
    var rowClass="doc-row"+(upl?" upl":"")+(isOpt||isPur?" opt":"");
    return (
      <div className={rowClass}>
        <div className="doc-num">{upl ? "v" : visDocs.indexOf(doc)+1}</div>
        <div className="doc-info">
          <div className="doc-name">
            {doc.name}
            {isOpt && <span className="doc-tag tag-opt">Optional</span>}
            {isPur && <span className="doc-tag tag-pur">Purchase only</span>}
          </div>
          {upl
            ? <div className="doc-sub" style={{color:"var(--success)"}}>{upl.name}</div>
            : <div className="doc-sub">{doc.sub}</div>
          }
        </div>
        <div className="doc-acts">
          {upl && <button className="rm-btn" onClick={function(){rmFile(doc.id);}}>x</button>}
          <button className="upl-btn" onClick={function(){if(fileRefs.current[doc.id])fileRefs.current[doc.id].click();}}>
            {upl ? "Replace" : "Upload"}
          </button>
          <input className="hi" type="file" accept=".pdf,.PDF"
            ref={function(el){fileRefs.current[doc.id]=el;}}
            onChange={function(e){onFile(doc.id,e);}}
          />
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="tnav">
        <span>FC Funding Tools</span>
        <a href="index.html">Mortgage Qualifier</a>
        <a href="package-builder.html">Package Builder</a>
        <a href="compliance-organizer.html" className="act">Compliance Organizer</a>
      </div>
      <div className="hdr">
        <div className="hbrand">
          <div className="hlogo">FC</div>
          <div><div className="htit">Compliance Organizer</div><div className="hsub">Submission Package Builder</div></div>
        </div>
        <div className="hbdg">FC Funding - FSRA 10671</div>
      </div>
      <div className="layout">
        <div className="sbar">
          {STEPS.map(function(s,i){
            var isDone=overallPct>=(i+1)/STEPS.length*100&&(i<3||done);
            var isAct=step===s.id;
            return (
              <div key={s.id}>
                {s.sec && <div className="slbl">{s.sec}</div>}
                <button className={"sbtn"+(isAct?" act":"")+(isDone?" dn":"")} onClick={function(){setStep(s.id);}}>
                  <div className="snum">{isDone ? "v" : i+1}</div>
                  <div className="stxt">{s.lbl}</div>
                </button>
              </div>
            );
          })}
          <div className="prog-wrap">
            <div className="pw"><div className="pf" style={{width:overallPct+"%"}}/></div>
            <div style={{fontSize:".7rem",color:"rgba(255,255,255,.4)",textAlign:"center"}}>{Math.round(overallPct)}% complete</div>
          </div>
        </div>
        <div className="main">
          {step==="deal" && (
            <div>
              <div className="sech"><div className="sect">Deal Information</div><div className="secd">Auto-fills the Compliance Checklist header.</div></div>
              <div className="card">
                <div className="ctit">Client and Property</div>
                <div className="g2">
                  <div className="fld"><label>Client 1 Full Name *</label><input value={D.client1} onChange={function(e){sv("client1",e.target.value);}} placeholder="e.g. Piyush Sapra"/></div>
                  <div className="fld"><label>Client 2 Full Name</label><input value={D.client2} onChange={function(e){sv("client2",e.target.value);}} placeholder="e.g. Neha Arora"/></div>
                  <div className="fld full"><label>Subject Property Address *</label><input value={D.property} onChange={function(e){sv("property",e.target.value);}} placeholder="e.g. 54 Sulmona Drive, Hamilton, Ontario"/></div>
                </div>
              </div>
              <div className="card">
                <div className="ctit">Deal Details</div>
                <div className="g2">
                  <div className="fld"><label>Lender *</label><input value={D.lender} onChange={function(e){sv("lender",e.target.value);}} placeholder="e.g. First Ontario Credit Union"/></div>
                  <div className="fld"><label>File Number (DFCF/VDFCF)</label><input value={D.fileNo} onChange={function(e){sv("fileNo",e.target.value);}} placeholder="e.g. VDFCF378091"/></div>
                  <div className="fld"><label>Closing Date</label><input type="date" value={D.closingDate} onChange={function(e){sv("closingDate",e.target.value);}}/></div>
                  <div className="fld"><label>Mortgage Amount</label><input value={D.mortgageAmt} onChange={function(e){sv("mortgageAmt",e.target.value);}} onBlur={function(e){var v=fmtAmt(e.target.value);if(v!==e.target.value)sv("mortgageAmt",v);}} placeholder="e.g. $500,000"/></div>
                  <div className="fld full"><label>Transaction Type *</label><div className="rg">{TX_TYPES.map(function(t){return <div key={t} className={"ri"+(D.txType===t?" sel":"")} onClick={function(){sv("txType",t);}}>{t}</div>;})}</div></div>
                </div>
              </div>
              <div className="card">
                <div className="ctit">Agent Details</div>
                <div className="g2">
                  <div className="fld"><label>Co-Agent on Deal</label><input value={D.coAgent} onChange={function(e){sv("coAgent",e.target.value);}} placeholder="Co-agent name"/></div>
                  <div className="fld"><label>Split (dollars, % or BPS)</label><input value={D.split} onChange={function(e){sv("split",e.target.value);}} placeholder="e.g. 50% or 100 BPS"/></div>
                  <div className="fld full"><label>Notes for compliance team</label><textarea value={D.notes} onChange={function(e){sv("notes",e.target.value);}} placeholder="Any notes for the compliance team..."/></div>
                </div>
              </div>
              <div className="brow"><button className="bp" onClick={function(){setStep("docs");}} disabled={!D.client1||!D.lender}>Next: Upload Documents</button></div>
            </div>
          )}
          {step==="docs" && (
            <div>
              <div className="sech"><div className="sect">Upload Documents</div><div className="secd">Upload each document in checklist order.</div></div>
              <div className="sum-box">
                <div style={{fontSize:".7rem",color:"rgba(201,168,76,.7)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:"4px"}}>Upload Progress</div>
                <div style={{fontSize:"1.1rem",color:"#fff",fontWeight:500}}>{D.client1}{D.client2 ? " & "+D.client2 : ""} - {D.txType}</div>
                <div style={{fontSize:".8rem",color:"rgba(255,255,255,.5)"}}>{D.property}</div>
                <div className="pring">
                  <div className="pi"><div className="pn">{uplReq.length}</div><div className="pl">Required uploaded</div></div>
                  <div className="pi"><div className="pn">{reqDocs.length-uplReq.length}</div><div className="pl">Still needed</div></div>
                  <div className="pi"><div className="pn">{uplIds.length}</div><div className="pl">Total uploaded</div></div>
                </div>
              </div>
              <div className="bulk-box">
                <div style={{fontSize:".8rem",color:"var(--gold-light)",fontWeight:600,marginBottom:".5rem"}}>Bulk Upload</div>
                <div style={{fontSize:".78rem",color:"rgba(255,255,255,.6)",marginBottom:"1rem"}}>Select multiple files at once - auto-matched by filename keywords.</div>
                <label style={{display:"inline-flex",alignItems:"center",gap:10,background:"var(--gold)",color:"var(--navy)",borderRadius:8,padding:".65rem 1.4rem",fontWeight:600,fontSize:".875rem",cursor:"pointer",fontFamily:"DM Sans,sans-serif",minHeight:"44px"}}>
                  Select Multiple Files
                  <input type="file" accept=".pdf,.PDF" multiple onChange={onBulk} style={{display:"none"}}/>
                </label>
              </div>
              {!isPurchase && <div className="warn">Non-purchase deal - Offer to Purchase and Down Payment are hidden.</div>}
              <div className="doc-sec"><div className="doc-sec-title">Standard Documents</div>{stdDocs.map(function(doc){return <DocRow key={doc.id} doc={doc}/>;})}</div>
              <div className="doc-sec"><div className="doc-sec-title" style={{color:"#2980b9"}}>FINTRAC Requirements</div>{finDocs.map(function(doc){return <DocRow key={doc.id} doc={doc}/>;})}</div>
              <div className="brow"><button className="bs" onClick={function(){setStep("deal");}}>Back</button><button className="bp" onClick={function(){setStep("review");}}>Next: Review</button></div>
            </div>
          )}
          {step==="review" && (
            <div>
              <div className="sech"><div className="sect">Review and Confirm</div><div className="secd">Check everything before generating your compliance package.</div></div>
              <div className="sum-box">
                <div style={{fontSize:".7rem",color:"rgba(201,168,76,.7)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:"4px"}}>Deal Summary</div>
                <div style={{fontSize:"1.1rem",color:"#fff",fontWeight:500}}>{D.client1}{D.client2 ? " & "+D.client2 : ""}</div>
                <div style={{fontSize:".8rem",color:"rgba(255,255,255,.5)"}}>{D.property}</div>
                <div className="sum-grid">
                  <div><div className="slb">Lender</div><div className="svl">{D.lender||"-"}</div></div>
                  <div><div className="slb">File</div><div className="svl">{D.fileNo||"-"}</div></div>
                  <div><div className="slb">Closing</div><div className="svl">{D.closingDate||"-"}</div></div>
                  <div><div className="slb">Amount</div><div className="svl">{D.mortgageAmt||"-"}</div></div>
                  <div><div className="slb">Type</div><div className="svl">{D.txType}</div></div>
                  <div><div className="slb">Docs</div><div className="svl">{uplIds.length} of {visDocs.length}</div></div>
                </div>
              </div>
              <div className="card">
                <div className="ctit">Document Status</div>
                {visDocs.map(function(doc){
                  var upl=uploads[doc.id];
                  var isReq=doc.req==="required";
                  return (
                    <div key={doc.id} style={{display:"flex",alignItems:"center",gap:12,padding:".6rem 0",borderBottom:"1px solid var(--cream-dark)"}}>
                      <div style={{width:20,height:20,borderRadius:"50%",background:upl?"var(--success)":isReq?"rgba(198,40,40,.15)":"var(--cream-dark)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".65rem",color:upl?"#fff":isReq?"var(--error)":"var(--text-light)",flexShrink:0,fontWeight:700}}>{upl?"v":isReq?"!":"-"}</div>
                      <div style={{flex:1,fontSize:".85rem",color:upl?"var(--text)":"var(--text-mid)"}}>{doc.name}</div>
                      <div style={{fontSize:".75rem",fontWeight:500,color:upl?"var(--success)":isReq?"var(--error)":"var(--text-light)"}}>{upl?upl.name:isReq?"MISSING":"Not uploaded"}</div>
                    </div>
                  );
                })}
              </div>
              {reqDocs.length>uplReq.length && <div className="warn">{reqDocs.length-uplReq.length} required document(s) missing. You can still generate but the package will be incomplete.</div>}
              <div className="brow"><button className="bs" onClick={function(){setStep("docs");}}>Back</button><button className="bp" onClick={function(){setStep("generate");}}>Generate Package</button></div>
            </div>
          )}
          {step==="generate" && (
            <div>
              <div className="sech"><div className="sect">Generate Package</div><div className="secd">Downloads the filled Compliance Checklist and merged package PDF.</div></div>
              {done && <div className="ok">Package generated - 2 files downloaded. Upload the merged PDF to Velocity.</div>}
              <div className="card">
                <div className="ctit">What Gets Downloaded</div>
                <div style={{display:"flex",flexDirection:"column",gap:".75rem"}}>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start",padding:".75rem",background:"var(--cream)",borderRadius:8}}>
                    <div style={{width:32,height:32,background:"var(--gold)",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:"var(--navy)",flexShrink:0}}>1</div>
                    <div><div style={{fontWeight:600,fontSize:".875rem",color:"var(--navy)"}}>Compliance Checklist - filled</div><div style={{fontSize:".78rem",color:"var(--text-mid)",marginTop:2}}>Header auto-filled. Checkboxes ticked for every uploaded document.</div></div>
                  </div>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start",padding:".75rem",background:"var(--cream)",borderRadius:8}}>
                    <div style={{width:32,height:32,background:"var(--navy)",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:"var(--gold)",flexShrink:0}}>2</div>
                    <div><div style={{fontWeight:600,fontSize:".875rem",color:"var(--navy)"}}>Merged Compliance Package</div><div style={{fontSize:".78rem",color:"var(--text-mid)",marginTop:2}}>All {uplIds.length} uploaded documents in checklist order - ready to upload to Velocity.</div></div>
                  </div>
                </div>
              </div>
              <div style={{textAlign:"center",margin:"1.5rem 0"}}>
                <button className="genb" onClick={generate} disabled={generating}>
                  {generating ? <span><span className="spin"/>  Generating...</span> : "Generate Compliance Package"}
                </button>
                <div style={{fontSize:".75rem",color:"var(--text-light)",marginTop:".75rem"}}>Downloads 2 files: filled checklist and merged package PDF</div>
              </div>
              <div className="card">
                <div className="ctit">Next Steps</div>
                {["Log into Velocity and open the deal file","Upload the merged Compliance Package PDF","Compliance submission complete"].map(function(s,i){
                  return (
                    <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",padding:".6rem 0",borderBottom:"1px solid var(--cream-dark)"}}>
                      <div style={{width:22,height:22,background:"var(--navy)",color:"var(--gold)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".7rem",fontWeight:700,flexShrink:0}}>{i+1}</div>
                      <div style={{fontSize:".85rem",color:"var(--text-mid)",paddingTop:2}}>{s}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>
      <div className="footer">
        <div className="f-left">
          <div className="f-av">NI</div>
          <div>
            <div className="f-name">Neel Idnani Mortgage Group</div>
            <div className="f-city">London, Ontario, Canada</div>
            <div className="f-contact">
              <span>519-697-2359</span>
              <a href="mailto:info@neelidnani.com">info@neelidnani.com</a>
              <a href="https://www.neelidnani.com" target="_blank" rel="noopener noreferrer">www.neelidnani.com</a>
            </div>
          </div>
        </div>
        <div className="f-right">
          <div className="f-agent">Neel Idnani - Mortgage Agent Level 2</div>
          <div className="f-lic">
            Lic. #M23005524<br/>
            Dominion Lending Centres FC Funding<br/>
            Brokerage FSRA #10671
          </div>
        </div>
      </div>
      <div className="f-disc">
        For illustration and administrative purposes only. Not a commitment to lend. Results are estimates subject to full lender underwriting, credit adjudication, and appraisal. No fees collected through this tool. Regulated by FSRA. For borrower rights visit <a href="https://www.fsrao.ca" target="_blank" rel="noopener noreferrer">fsrao.ca</a>.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
